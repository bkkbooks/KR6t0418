云寂靜已上三外道名扇陀此云隨流栴陀利此云下姓女栴遮女孤陀利可云重動可愛也阿毗曇毗婆沙二十五升離女可云首陀此云白栴遮摩耶耆女應云栴遮摩耶毗歌此云動淨行女菩薩處胎經五栴陀可云栴陀羅此云月佛説大意經已上五女人部出之世羅求呵世羅者山求呵者穴是山部受利樹此云柏占蔔亦云占波亦云占婆此云華樹論曰金色花扇那衣可云賖那此云樹皮衣栴陀摩尼可云栴陀羅摩尼此云月珠是寶也剎那此云生滅是時分也已下雜人部洗尼頻鞞波羅譯曰洗尼者軍頻鞞者謨波羅者力瞻鞞譯曰皮栴遮摩尼栴遮者動摩尼者珠禪豆應云禪兜譯曰衆生栴提羅此云摩作貰舍應云世沙此云餘殘旃遮嘉摩栴遮者動嘉摩者樂五教反已上六雜人部設陀鄰伽醯神經曰攝聲栴陀栴陀利栴陀者可畏亦云惡栴陀利者下姓女是神名也占波國亦云瞻婆此云花也栴陀惟摩羅經曰月明也葉波國此云地瞻蔔國此云花也已上三國名栴頭摩提可云栴他摩底此云惡意是城也瞻婆城此花名也栴陀羅村此云月也仚薜師子王可云廁波此云躑也招提僧堂招提者四方也已上出翻梵語寒世多賊制羅又注羅姓剎怛羅將軍細曩波底橋細覩月蝕戰捺羅二合誐羅賀石世攞柳制多沙答怛里二合臥具世耶那薩喃已上出梵語雜名剎帝利隋云田主從衆人福田之中取地分故為名瞻部樹此云棗樹其形大也興師也闡陀鞞阿書譯云分別字智彌沙寒律三十細那大臣應云斯那譯云軍生經三羡那長者應云斯那經云軍也栴陀利應云遮陀利譯云下姓女出曜經七旃彈那又云栴檀此外國木也赤白紫等不同苫弭苟把根苫弭哆甘松黑色之草世黎也芆細在此方孱那比丘名也土箇也哂陀又云摩哂陀是阿育王子也戰達羅鉢剌婆王此云月光王名逝多林古云祇陀此云勝林是舍衛國給孤獨園也西城六經律異相一珊檀那舍王舍城中長者之名苫跋囉此云河從河國名大豆神旃稚女即主竈神設羝嚕此云怨也設賞迦王此云月闡鐸迦古云車匿訛也此云樂欲折利呾羅城此云發行羼那特多王此云勝軍古云波斯匿訛略也蘇支目佉魏云針口已上出信行梵語集占蔔大論十云薰花樹也世夷羅婆羅門此云實夷羅者山也栴闍婆羅門可云栴陀此云惡性闡提譯云隨意作也施婆羅應云施始來及婆羅譯云薀藻闡那譯云覆藏亦云欲作睒婆利王此云木綿睒摩羅須倫此云睒摩羅者縛也苫菊衆世界此云黃花是世界部施多毗迦可云首多地歌此云首多者目地歌者最先底般波羅山應云那帝波膩波羅那帝者宿波膩者水破羅者護瞻婆此云金色花樹是樹部睒婆花可云睒婆利此云木綿栴那花此云香名也細那大臣此云軍是大臣部羡那長者可云斯那此云軍是長者部寸孝戍迦淨輸上止聞戍嚕二合多箕戍書聿反跛曬戍灑拏奕儒引多嫌儒虞波娑二合引已上義淨千字文修伽陀修云好伽陀云去須摩那花光此云好善須扇多佛亦云須那多此云好寂靜須陀扇可云修陀梨舍那此云善見首陀尸利佛此云淨吉首楞嚴三昧力王佛此云三昧一心須彌迦羅佛此云可愛光已上七佛號修妬路亦云修多羅此云法本解義首盧可云首盧伽此云日偈殊掘多羅經此云可惡呪羅呵象辟經此云象須尸摩經此云好堺已上經法首夷婆損陀羅可云首脂婆孫陀羅此云淨語好是外道法名也首呵那此云好打長阿含第一周羅此云頂髮亦云小修摩羅此云好垢修陀尼毗婆沙修陀尼者好寶毗婆沙者廣説周囉卑陀羅可云周羅鞞陀那此云少受善見律十五須沙尼此云冢間輸屢那此云聞首楞可云首楞伽聲此云勇須摩提可云須三摩提須此云好也三摩提者一心須陀般那此云淨林已上八雜法名也須摩提應云須摩底此云好意是雜人名須陀須摩王須陀者聞須摩者月須賴此云大已上菩薩名首楞嚴此云勇健是菩薩法也須曇摩辟支佛此云好法須菩提須此云好菩提此云道亦云智信行云此云善現須鄰那迦蘭陀須者好鄰那者與迦蘭者村名須蔓那比丘此云好意亦云好慢須濕多羅此云好眼須婆睺此云好肩須那剎多羅須者好那剎多羅者星名呪梨般陀伽呪利者小般陀伽者路須玖陀羅此云好賢須羅陀此云善得輸提此云淨除亦云校定輸毗陀此云可愛須闍多此云生輸毗多此云可愛須提那此云好與亦云善與須尸摩此云好堺周那難提此云小善須闍多此云好生輸毗陀此云好智修密多此云善知識樹提池娑樹提者大池娑者苫修摩那此云好意輸盧那此云聞修摩䨲婆此云善人亦云善淨行須那迦鬱多羅須那迦者淨鬱多羅者勝也須那可多須者好那可多者不害修羅斯梨此云勇體須提難此云好生須漫羅漢此云好意宿闍諦此云好生須滿可云須摩那摩此云好意已上三十一比丘名須彌陀比丘尼此云好聰睿輸那此云江輸陀摩此云好鬘華守迦此云鸚鵡須夜摩此云妙光周那難可云周羅難陀此云小歡喜升迦羅可云升歌此云好時修目佉修者好目佉者面數那此云聞須耶帝此云好威儀已上比丘尼名須陀沙彌須者好陀者起周那此云辟已上二沙彌名須陀洹亦云須呵洹亦云須陀般邪此云入流是沙門果首盧數此云好瞋是罪纍名修伽陀修云好伽陀云吉亦云説亦云善誓持律者云善説已上婆羅門首胎此云淨修婆那此云好林術闍師利術闍者想應師利者吉也已上四婆羅門名須毗羅王此云好勇須提奴太子可云須地那此云好與修師摩王子此云好堺修修佛伽王此云極好覺龍修陀者王此云好見亦云喜見修樓婆王此云好須提羅王此云快因修闍提太子此云善住亦云善生修濕羅王此云好眼輸徒檀那王此云白飯王須陀素彌須陀者聞素彌者用也須闡提太子此云隨意須曼王此云好意須陀摩王此云好繩亦云好華須波佛王此云善覺首陀羅此云下事修陀奢那王可云修陀梨奢此云好見已上十五王太子名須達多此云好與樹提伽樹提者火亦云明亦云星伽者行樹提衢應云樹提伽此云大行是雜人部出之已上二優婆塞名須摩那此云好意修摩提此云好慢修摩迦提此云可愛須卑優婆夷此云好意亦云好念已上四優婆夷部須那剎多羅等此云好星首迦阿低梨犁首迦者鸚鵡阿低梨犂者無油須卑可云須比履此云好念已上三外道名首樓那長者此云聞須檀應云須檀那此云好物興起行經下已上二長者名須剌婆夫人此云勝味須摩檀此云華施賢愚經五須梨婆羅滿夫人此云日增上已上三夫人也須羅婆女須者好羅婆者得須闍陀女此云姓生大論三十五升離女可云首陀此云白須羅陀經云鮮潔此云善得已上四女人名須彌山可云須彌樓須者好彌樓者光宿波羅首此云久印樹提陀羅此云火持首摩羅山可云波摩羅修者好摩羅者行次已上四山也須摩竭陀池可云須摩伽陀此云聚會須摩耶此云好喜是樹也朱利草論曰賤此云偷須曼花香此云好意花須牟尼婆梨師香須牟尼者好仙人婆梨師者憂生修揵提花此云好香須漫陀花此云好小芻摩繒綵亦云識摩亦云蘇摩此云兼布芻彌衣此云布衣朱羅婆梨迦羅衣律曰雜碎衣已上三衣服修陀甘露修陀此云白色周羅漿此云小修修羅脂可云修伽羅此云豬修出律曰青豆羹首羅譯曰勇也須達拏譯云好施純陀應云準陀譯曰好義殊提應云殊那譯曰明修梵摩譯曰好淨周那他應云修那陀譯曰好聲周那亦云呪那亦云朱那譯曰碎須濕牟梨破群那應云修濕槃多羅牟梨破群羅曰修濕多羅者好牟梨者根破群那者星名須達那應云須陀那須者好陀那者物亦云寶首迦摩納都耶應云首迦耶婆都耶譯曰首迦者鸚鵡摩耶者如上説都耶者父須尼陀譯曰善謀略也輸屢那譯曰腹須陀耶譯曰共起修樓脂譯曰好樂修波羅提沙譯曰極遠彼國須深摩亦云須尸摩譯曰須者好也尸摩者堺手提侈婆休應云修佐多羅婆休譯曰修者好泥多羅者眼婆休者扇守籠那應云守盧那譯曰聞也修那伽譯曰善龍修毗賒譯曰嚴飾周羅般陀譯曰小路臭休羅人是國名也須那剎多羅須者好那剎多羅者星須涅多羅譯曰好眼輸陀羅應云耶輸多羅譯曰名聞持也修跋那婆蘇應云修槃那婆娑經云金光明修淩陀人此云天王須那羅此云好人須夢經曰善念首羅輸盧那首羅者勇輸盧那者聞須陀那羅此云好施人輸論經曰明聽須耶舍摩提此云好名聞意須多利此云好度修羅陀此云好車樹提伽耆婆此云火命須羅陀經曰鮮潔此曰妨得須闍應云修闍低此云好生須達此云善溫輸陀耶舍此云淨名聞已上三十六雜人部修逸跋摩應云修旨跋摩此云針尼首羅那羅延神此云勇力已上二神名修羅兼云守羅論云不此云勇修至漏摩應云修至盧摩修至者針盧摩者毛修陀利舍那鬼王此云好見亦云善見修婆睺此云好有已上四鬼神名輸陀羅龍王此云善持須檀延此云共起雜狩部須桓難越鳳凰可云須槃那般那此云金守摩羅律曰鰐魚此云好垢修脂目迦蟲此云針口是蟲部須賴吒國亦云須羅吒此云首羅先那國此云勇軍須摩國此云月修利安安息此云修利者胡輸盧波羅輸盧者問波羅者護首呵利士經曰淨眼已上五國土也首婆波羅城首波者可愛波羅者護輸摩跋吒此云月長須波羅利弗城可云首波吒利弗多羅此云好樹子須賴吒賓伽羅須賴吒者好賓伽羅者黃赤色須曼鉢名城傳曰金斗城已上五城部修舍慢伽此云本體是聚落也隨鳩羅聚落可云薄鳩羅此云樹名也輸盧吒此云聞也是村也須利講堂此云日也修伽陀舊云修云好伽陀此云吉亦云説亦云善誓出要律儀八須大拏經此云好施輸盧尼此云好形貌須波迦此云可愛諄那沙彌可云準陀此云問須跋陀梵志此云須者姓跋陀者賢也修跋長者可云修跋羅此云好賢須達長者亦云頭達那此云好與修羅陀長者此云好得又女人部出之修闍多此云姓生私云恐好生歟是居士部須夢那此云好意修陀那此云好物輸提陀應云又持陀經云淨除周羅千世界此云周羅者小也是世界部輸那國此云江名也須離國此云勇修迦羅此云好時周妒國此云落也首波城此云首婆此云可愛輸盧那此云聞是處所部須陀蘇那此云泉修婆鳩吒山可云首婆叉吒此云性臺修羅吒此云修者好也羅吒者國也是河部須摩那池此云須者好也摩那者意隨藍風可云毗藍此云迅猛是風部須浮摩樹林可云須浮寐此云須者好也浮寐者地也是林部修摩那樹此云好意是林部須漫提花此云須者好也漫提者湖須摩那花亦云須曼那此云好意須蔓羅花此云須者好也蔓羅者花輸婆摩彌花亦云輸婆摩耶此云可愛已上出翻梵語集精戍訖攞糞戍娜耳述嚕怛羅又羯喇拏命戍尾單聞上輸曩淨戍者又戌儞弟又戍地讃戍怛羅嫌啂愚上鉢哆痛戍欏吉戍麼凶戍婆憂戍迦好主乞史十六數捨舍戍陀戍捺羅侍述路迦白分戍迦攞白博乞史二合分明日戍以蛉戍吉底乾戍迦髮主拏去鸚鵡戍迦已上出禮言梵語雜名周梨槃陀迦此云蛇奴或云小道邊又周那此云不藥又路生應云周梨槃特伽相傳云鈍根羅漢但誦一頌也首夷婆損陀羅應云首暗婆孫陀羅首暗婆者淨孫陀羅者好亦云可愛是外道法也修跋長者應云修跋陀羅譯云好賢增一阿含十三須達長者亦云須達那譯云好與阿毗曇毗婆沙五十修羅陀長者譯云好得法句經一須賴沙夫人譯云好味須利波羅滿夫人應云修利耶婆羅縵譯云修梨耶者日也婆羅縵者增上賢愚經二須曼那譯云好意大論七須摩又蘇摩此云月戍縷多此云能聞主多光此云火也四方雷電神之內西方修梨耶隋云此是彼也輸㸸盧檀那隋云白飯純陀私洟羅隋云無有炬修婆睺隋云善臂已上出信行梵語集須陀食百緣經出之天須陀食云云月贊捺羅二合定扇引多聲攝波娜二合兄弟臡而濟反瑟𡛥二合勃羅二合引多伯臡如上瑟𡛥二合比怛哩𥖣勢引攞偃細覩巖勢攞已上義淨千字文寒世多賊制羅又注羅姓剎怛羅將軍細曩波底橋細覩月蝕戰捺羅二合誐羅賀石世攞柳制多沙塔制怛里二合臥具世耶那薩喃已上出禮言梵語雜名檀香塔月蝕將卒古云栴陀羅姊行天父魁膾惡性月水精出水者白兄弟已上全真譯聞性白盜乾耳不聞聞首陀四姓之內已上全真譯表紙此名鵝珠抄草繫抄貝葉抄鶴林抄本記云先師傳燈大和尚屬此之內是其一也末資隆興記之寫本記云常喜院真筆草本書寫畢無極努力努力不可及外見云云建保三年乙亥於高野清金剛院僧坊書寫之紇至于山未及披露者也尤可愚學沙門譽
