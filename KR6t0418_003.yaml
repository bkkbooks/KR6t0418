body:
  text: 多羅葉記卷下計下係姹重獨計嚩攞侯計嚩攞蘂計沙羅因係覩剖劍跛幽儼毗引囉已上義淨千字文憍陳若佛此云姓甄舛伽經此樹名也揵陀梨呪揵者地陀者枝也揵度此云體亦洽亦云品甄迦羅頻婆羅阿閦波偈此云作何漠式不動已上四經法部劍婆石可云劍婆羅此云𪵜㲪罽利沙槃可云罽利沙盤那此云錢數乾盡此云一切物名乾若此云計數雞和多應云枳跋多譯云殺盜魚人罽那應云罽那蘭譯曰耳也已上九雜人揵陀利此云地持是雜姓部揵揵婆亦云乾沓婆亦云乾沓和亦云臭香亦云樂嶽神甄陀羅亦云緊那羅亦云真陀羅此云是人非人建陀應云祕達陀此云陰醯摩跋陀應云醯摩鉾婆多亦云醯婆但此云雪山劍摩舍帝此云劍摩者作舍帝者百醯摩拔陀醯摩者舍跋陀羅者賢已上六神名醯摩鉢低鬼應云醯摩低此云金珠揵陀尸阿此云香勝是二鬼神部欠婆羅龍王此云毛衣憍陀龍王可云憍哆麼此云姓上二龍部醯摩和像可云醯摩婆多醯摩者雪婆多者山蹇陀波利波羅可云私建陀波利婆婆此云陰翼從已上四雜法部乾陀呵提此云香是菩薩也憍梵波題憍梵者牛波題者主乾荼此云箭罽賓沙門此國名騫陀毗耶此云香也騫荼達婆此云陰第騫荼此云行也揵那目揵連此云耳姓也已上九比丘部罽那可云罽刺那此云耳是妙彌也醯摩闍可云醯摩闍此云雪生是比丘尼也醯頭摩納可云醯兜摩那婆醯兜者目摩那婆者年少淨行也是外道名也乾陀賤此云乾陀者香也乾提阿藍應云乾陀阿藍譯曰香林甄陀羅應云甄那羅譯曰人非人揵多譯云行揵陀馬此云香揵涉可云遣此云納是馬也揵闥婆此云臭香亦云樂神是鳥名出之袈裟相世界袈裟者此云染衣憍薩羅國可云菩薩亦云㸸婆娑羅此云工巧乾陀羅國乾者地陀羅者侍劍浮此云好乾陀越國可云乾陀婆那此云香林劍磨瑟曇㸸樓劍磨者葉瑟曇者驗㸸樓作劍浮沙此云好揵陀羅吒國此云香揵陀賴國可云揵他賴吒此云香劍桴此云好亦云勝劍蒲闍國此云可愛揵陀呵剝土可云樂音乾若國此云藏揵闍洹那濕羅羅可云揵闍槃那那洹羅揵闍者藏槃那者林那洹羅者不里乾陀越國可云乾揵婆此嗅香亦云樂神已上十三國土名也醯羅傳曰䕣城是城也揵闥婆城此云臭香神亦云樂神揵荼此云香是村也揵若此云衆聚是寺也劫摩沙可云劍摩沙此云除棄是處前部揵陀摩摩羅此云香花揵陀摩呵衍山揵陀者香摩呵衍者大乘醯摩山此云舍也乾婆伽山可云乾闥婆此云樂神已上三山名罽賓跋陀可云罽賓羅跋陀羅罽賓羅者蒼跋陀羅者賢揵池樓此云地持揵陀菴羅樹此云香果已上二樹部甄舛迦寶此云鸚鵡已上出翻梵語劍婆石應云劍婆羅譯曰翰證大智論二十七乾盡律曰一切物名罽拏𨑥譯曰里也倪樓國名也乾陀此云香倪𭢰鋒龍名也甄波迦果名也倪三颰人名醯嵬切利諸天子名也嵬五回反羯拏伽羅羯拏此云耳伽羅此云𩒐醯囉拏地醯羅拏此云金也跋地此云勝金勝也乾闥婆書天音聲雞尸隋云多髮罽利沙槃應云罽利沙槃那譯云錢數已上出信行梵語集喬答彌古云憍曇彌又瞿夷説也此云女也十二遊經罽那那伽羅菩薩大論七云荼言寶積泉水彥馱嚩波抳髮計戍儞深儼毗羅何處去計努囉誐車栖下係瑟姹二合麼怒計陀何作計羯㘑幾計底丁以反單計攞嚩昨係爾雪係麼蘂計捨羅神係嚩哆旗計都幢計覩殿蘖馱矩吒庫彥喏動劍波底又已上出禮言梵語雜名尋香神耳去頰乾闥婆女喉雪已上出全真梵唐語不媚布路二合娑引儞寧以反迦食坌惹富樓沙曇蘇婆羅提是佛號富樓沙名丈夫曇蘇名可化婆羅提名調御師名可化丈夫調御師出大論三佛陀此云知者亦覺者出大論第二已上二佛號部富沙書富沙此云星名是外道書部富伽羅此云人亦云福伽羅富羅此云滿十誦律富闍蘇此云可供養坌那祗迦玢那此云滿祗迦此云縊富槃那此云晨朝不蘭陀羅此云破城無他奇云比不迦羅此云蓮花名已上八箇雜法名也無提此云歡喜是山名文殊師利可云曼殊沙尸利曼殊沙此云華亦云藏尸利此云吉富樓那可云富樓那彌多羅尼子富樓那此云滿彌多羅尼浮彌此云地浮磨此云地邠耨此云福德快遊此云風也分坻梨師達多此云淨仙與邠耨加菟像此云福厚富鄰尼比丘此云滿女富那婆婆此云滿住不那婆此云更離富蘭那此云滿不蘭迦葉此云滿姓不闍宋比丘此云供養月富寫提婆此云星也無迦利可云物伽也此云姓斧律那實比丘梁云滿宿浮陀跋摩浮陀此云實跋摩此云鎧浮陀提婆此云非天佛提此云意佛陀提婆此云覺天邠耨文陀尼子此云滿嚴飾女子不那沙門此云滿不若密多羅此云善知識佛陀密多此云覺友佛陀多羅此云覺滿又云佛陀多羅傳曰佛救雜人名佛陀柳友此云覺樂已上二十一比丘部文陀尼子此云莊嚴女是比丘尼名也布薩此云增長功德又云淨住分衛可云賓荼波陀此云乞食已上二聲聞行邠陀施可云富那抱此云滿樂是婆羅門名無崙荼王此云天子等文陀竭王可云文荼伽此云頂也無訶羅闍此云木分波檀王此云功德緣施不羅王此云城上三王部文荼長者此云無數布薩多居士此云增長功德亦云布薩陀福伽羅此云人也文尼譯云仙人富多羅可云佛多羅譯曰子富樓沙應云富樓沙譯曰富樓沙此曰丈夫亦云人富那奇經曰滿願已上雜人部也不奢密應云不奢密多羅譯曰不奢者問提密多羅云友富闍譯曰供養富盧醯侈譯曰國所宗歸也富那婆藪此云滿寶富那跋陀此云滿賢已上十五雜人名富那婆藪鬼神富那如上婆藪此云寶亦云地亦云物富那跋富那者滿跋陀者賢佛陀佛陀樓多神此云覺緣聲也浮陀亦云部陀亦云浮荼此云已生亦云大身已上三神也富樓多那應云富多那此云臭也佛陀婆羅夜叉龍王此云覺護富多羅此云臭蘭已上四鬼神名富那跋檀國傳曰豐滿是一國部富樓那跋檀大城可云富樓那跋陀羅論云長功德此云滿賢富單那城此云臭不那婆檀城此云豐滿城負彌城此云地也富婆僧伽藍可云富樓婆此云連僧伽藍此云衆薗富婆羅彌寺可云富婆彌此東園已上出翻梵語集坌那阿毗曇藏名也補剌拏伐摩王此云滿胄也布灑星此云鬼宿也布利拏此云圓滿佛陀馱婆此云覺使佛馱跋陀羅此云覺賢補喝國此云中安國佛馱耶舍此云覺名浮陀跋摩此云覺鎧佛陀什此云覺壽佛陀扇多此云覺定富數婆書龍華浮摩提婆書地居天富沙迦羅仙人説書隋云蓮花逋婁婆毗提呵書須彌東菩蒲沙他尼山陀書一切藥草因已上六十四富蘭那陀隋云滿也六部羅陀隋云不呌喚分那婆素隋云井者布薩秦云共住覆羅種甘蔗竹葦等已上出信行梵語集地步入弭池布沙迦二合羅儞又沙羅曩富單那布單那已上出禮言雜名地丈夫宰相已上全真梵唐已遺護嚩抳引是護引底丁以反梳競迦娜已上義淨千字文蜫盧提迦經此云衆所宗敬已上一經部金毗羅此云是孔非孔騫此云行巨舍羅此云牛屋巨醯此云屋宇恆耆迦此云生恆水騫陀達多此云行與劫賓菟可云劫賓那此云分別時已上五比丘部羯磨此云事亦云作是聲聞德行恆伽達可云恆伽達多恆伽者何達多者與劫賓寧王此云分別時已上二王太子部恆提婆女可云恆伽提婆恆伽者天堂來提婆者天大論七十五騫陀陀驃應云騫陀巴毗譯曰行林騫陀達多譯曰行與渠尼譯曰有伴騫荼陀婆亦云鍱荼陀婆譯曰騫荼者行陀波者山劫毗羅譯曰蒼已上五雜人部出之恆伽神此云天堂來金鞞盧應云金鞞羅此云是非孔唯孔已上二神名部姑利龍王可云已利霖此云巧行亦云次第是龍部劫賓耆羅此云蒼也是雜狩部睺此云從聲為名是地獄部出之恆伽沙國此云恆伽者天堂來是國界部出之金燈智伽藍此云僧伽藍者衆國是寺部劫摩沙可云劍摩沙此云除業處所部出之恆河亦云恆伽河恆伽者此云天堂來恆伽提河可云恆伽提婆經伽者如上提婆者天恆水可云加此云天堂來已上二河部出之劫貝沙華此云古貝恆裟娑相衣可云桓娑恆娑者鵝恆河肯反憍奢耶此云蟲劫貝衣此樹華名鉤鉢多羅此云小鉢劫波育疊劫育者分別時分劫波塗沙亦云劫俱頭沙此云調布已上六衣服部劫賓闍羅炙此云染子劫必他漿此云劫必他者利恆鉢那此云麨金樓伽漿此云根劫𤿺論曰分別時節已上出翻梵語集根牟羅波利耶應云根摩牟羅波利耶譯曰根摩者葉半羅者根亦云本波利耶者波古貝樹名也以花為疊五色也樓樓多聲居吒奢摩離隋云庶聚樹名也乎盧庶隋云可畏已上出信行梵語集劫波大日疏一云初云離一切分別梵云劫波次云無分別者梵不初渡夜帝罽賓劫比舍也出梵語雜名恆河火壇飯已上全真譯江同曀迦娑他二合引一曀迦上條曀計迦栖曀迦引枳引穆多專曀迦引仡羅二合麼曩斯曀多志曀迦止多單曀迦補吒引茲曀多覩已上義淨千字文閻浮那提金光佛閻浮者樹名那提者江閻浮檀金須彌山王佛此樹江名也已上佛部焰摩伽經此云雙也是經部閻婆阿羅漢婆者禁制也比丘部閻府師利閻府者是樹名師利者吉也是婆羅門焰麼此云縛也是王部出之閻浮車毗浮者樹名車毗者皮也是外道部閻浮檀世界可云閻浮那陀閻浮者樹名那陀者江閻浮提閻浮者樹名提者州名也是國土部出閻鬪此云紫色是村名閲叉寺此云能噉是寺舍部出之閻摩羅此云雙是河部出之搖𮑱那水可云夜牟那此樹名也鹽牟那水此云縛也已上二水部出之閻浮果其果紫色也閻浮那金可云閻浮那陀亦云閻浮檀此云閻浮者樹那陀者江寶部已上出翻梵語集翳迦此云一也挻樹樹名也閻頭檀王隋云淨飯王已上出信行梵語集單翳迦補吒如此翳舍一邊翳吒迦又云偏一翳迦是翳縛又戶底又婆嚩底二十九翳罽拏那哩二合舍磑焰怛羅二合十九翳俱引拏尾舍已上出梵語雜名關一是已上全真記一時今一如是如是如是如是如是如是如是如是如是如是焰磨不易一號已上阿彌陀經梵本天雷禰嚩𮓌惹底丁以反乾禰嚩星禰嚩補怛嚩二合裏第𮚞多神禰嚩多威帝惹南給禰也圍弟紕多鄉禰捨天禰嚩已上義淨千字文底夜膠可云體夜此云人前尼律第五底夜如那此云偷林已上二雜法部出之帝舍此云光明帝須此云光明帝須達多亦云帝沙達多此云光與低羅末可云底羅那末底此云度意已上四比丘部泥羅此云兩舌是優婆夷部低舍羅絺多此云光護是夫人部出之提婆跋提夫人提婆者天跋提者賢帝路沽女此云麻勝是女部低舍難陀坻舍者光亦云火也難陀者喜也是女部四分律五低舍亦云帝奢譯曰光亦云火是雜人部坻羅波夷坻羅者油波夷者飮鳥部提迷魚亦低米此云暗提迷耆羅魚可云低米耆羅此提迷者暗天已上二魚部褅婆達兜泥梨可云提婆達多提婆者天達多者與已上二地獄部坻彌羅樹此之細也已上出翻梵語集底胢古我反山名低舍羅締多應云低舍溢低舍者光亦云火溢締多雜阿含二十三胝子母名也帝羅闍隋云胡麻生也帝梨富婆隋云胡苽提婆鼻何羅隋云遊天提婆羼那此云天軍聖名也已上出信行梵語集泥尼外國翻為葛陀摩跋那翻為泥色天泥嚩又素羅眼泥吐嚧冬長泥去引伽説泥去賖多又婆史多方泥捨又素儞厥數嗔泥沙又嚕瑟吒又説羅馱與儞泥從與我泥名油帝攞宰官泥誐麼天廟泥縛矩羅讀泥娑天神泥嚩多天宮泥嚩補羅天女泥嚩迦儞也云比舍旨已上出禮言雜名杉酪與運油瞋天女天界天祠眼已上全真梵唐語底沙佛上字丁禮反舊云弗沙此云明也出一切經音義二十四卷玄應阿矩阿禰捨停阿蹉上明阿引路腳不阿曩暗頞馱迦引路字惡乞灑二合縛陽阿引多上博意阿鼻鉢羅二合引也來阿引伊上捨策阿毗世迦義遏他窶阿捨羅二合弭也庭盎上誐拏野阿吒上味追阿引羯羅灑二合今阿儞也二合而阿上多隨阿耨鉢室者二合都錐阿引囉激阿引娑怖二合吒致閼他父阿乞灑二合囉參阿娑頗二合引以過阿底乞闌二合引怛羅次阿曩底訖囉二合底非阿儞也二合鼻他偏阿嚩曩多抽阿引羯囉灑誠阿毗鉢羅二合散曩戌阿庾馱設娑覩騰阿部娜誐二合多謀阿嚩娑建二合娜臨阿多重指盎上虜澀嚩二合元阿引儞爾以反靡頞耨怛曩二合多裏阿便上多羅遂阿弩引攞令阿引禰捨食阿引賀囉噉阿娑嚩二合引娜薑阿引捺囉二合迦斟阿拏摩引曩敬阿引閉乞叉二合小阿粃攞違阿底訖囉二合麼司阿地迦囉拏畎阿引係吒上降阿嚩多引囉懶阿引攞寫馬阿濕嚩二合順阿弩路麼斗阿引頗迦價閼伽依阿引室囉二合也凶阿僧誐里也二合碧阿引迦捨嚩無割反羅拏二合攀阿引迦囉灑二合鄙阿娑曩半音園阿引羅引麼比阿曩摩曩顧阿嚩路迦別阿底也二合望阿引航上乞灑二合隱頞多羅引曩骨阿娑體二合迦潛阿涅哩二合捨也二合扶阿弩攞限曩二合冥頞馱迦引羅祛阿跛曩也念阿弩娑麼二合羅拏罪阿引鉢底具阿引娑曩有遏悉底二合題盎誐八阿瑟吒二合餘頞儞也二合習阿毗也二合娑奇遏娜步二合多始阿引儞樣阿引捺捨初阿引儞寧以反託阿室哩二合多無阿支有何悉底終阿哆重來阿引誐多可阿嚩始演二合徘阿襪多目惡乞使口阿引寫指盎虞隸句盎虞捨牽阿引羯灑腸盎怛羅骨阿娑體二合嗚呼阿護迦瑟吒二合過阿跛羅馱奇哉阿補引嚩前阿仡囉二合多聖阿引哩也二合已上出義淨千字文骨阿悉地儞聾阿波曳眼阿吉史又阿嚕者迦指阿遇上里指節遏戌上里鉢羅靺多胯阿嚩人薩多生交央伽社多方阿泥羅醜阿勢嚩曩碧阿迦捨赤曷羅迦多語阿引攞波敕阿吉娘聽許阿弩曰喏哆飽阿捨拏啖阿薩馱訶醋阿銘攞始阿怛多終阿娜比財阿㗚他可阿縛悉衍位阿掣對面阿毗目地來阿誐車又阿誐多早阿儞始順阿都路麼無始阿努婆縛底初阿儞間阿那重囉斗阿頗迦上馬阿濕嚩二合烏迦攞下馬阿濕嚩二合烏娜引囉喚阿麼怛囉曩追阿揭㗚史哆不善阿迦里也曩又阿娑度有阿悉底必阿嚩羅悉也懶阿引攞娑也無常阿儞怛也無慚阿紇里無愧阿努波耶自阿波拏又阿怛麼全阿羅馱二合引八阿史吒十八阿史吒二合捺捨八十阿勢底少阿臘麼鐵河野娑食阿引賀羅麵阿引吒客阿薩都家阿縛捨達官阿引莽底也義阿羅他二合字阿乞史二合羅四月阿沙引荼七月阿濕縛二合具惹今阿戶拏又阿儞也生阿引麼園阿羅麼又烏儞也二合曩又苑也座阿引薩曩虛空阿迦引捨陽阿路迦日阿儞底也二合明阿引路引者闍阿吐迦引羅焰阿㗚制二合炭阿引擬羅頸阿梨耶阿修羅阿素洛杏阿引舍儞矩桃阿引嚕白楊阿引殺拏二合縛胡桃阿乞朔二合羅刀阿庾馱牛膝阿波麼羅誐錐阿羅薑阿捺羅迦菴摩勒阿摩攞迦庭阿凝誐曩倚帶阿也鉢吒園怛羅二合儞也二合曩又阿攞引麼鏡阿娜噸捨濕阿捺羅覆著阿那壓阿縛瑟吒二合雜阿引計㗚拏前阿誐羅二合多讃阿拏鉢羅已上出禮言梵語雜名阿魏藥此云興渠也五辛之內是出梵網經古迹記惡叉波漢云奮迅阿笈摩此云數法亦傳謂展轉傳來相教授也出一切經音義第二十四玄應阿那含阿修羅女阿羅漢阿修羅非天八非人萬水火毒藥不動穀為華鉤門開教授師阿逸多召來不咬呼請無量知合左足空日陰偏醜馬眼口八十炭辛語迎送罵我妬道路憎喚客義請暗下過聖來有財富財利阿蘭若廣野園房宮人將來將來下脣未就生藏肚子腸對法裸形飮食無罪過財利損無財貧少有財已上出全真梵唐語阿若憍陳如此云已知陳如姓也出文殊問經上阿難陀此云大歡喜阿羅訶大日疏一云阿羅是煩惱訶是害義除義釋論謂之殺賊又阿名不羅訶名生復次阿羅訶是應受供養之義阿賴耶大日疏二云阿賴耶是執持含藏義亦室義阿濕嚩沙正譯云蘇息處阿練若又三云阿練若名意樂處空寂行者所示樂之處阿伽陀此云無病藥出華嚴經音義印融加之阿娑婆那伽三摩地翻無識身三昧舊梵語阿耨無多羅上三藐正等三菩提正覺新梵語應供正遍知阿鞞跛致位亦云阿惟越致阿此云不鞞跛致此云退也大論第四阿羅呵亦云阿梨訶阿羅名賊呵名殺曰殺賊亦云應供阿耨多羅此云無上亦云無勝阿彌陀佛此云無量光阿閦佛應云阿閦毗夜此云不動阿梨沙亦云阿利師此云聖人阿毗三佛亦云阿惟三佛此云大覺阿私陀佛此云不曰阿泥羅墮羅佛此云風門阿闍墮佛此云未生門阿婆摩此云無等阿栴陀墮佛此云不瞋門也阿波摩婆摩可云阿婆磨娑磨阿樓那墮邏佛此云曉門阿樓那此云曉阿提彌留佛此云超出須彌已上十三佛并功德阿毗曇此云無漏惠阿他婆耆經此云義品阿婆陀經此云譬喻阿差末經此云無盡意阿羅伽度波摩律云辟經阿陀婆耆耶修妬路律云象德經阿吒那此云呪鬼名阿毗羅此云道德阿能伽耶正見經此云無苦阿濕婆羅延經此云不安穩度彼阿毗達磨此云無比法阿耨風經此云小阿闍世王女阿術達經此云直與阿含可云阿伽摩阿陀米衍尼經此云持也阿輸羅耶那經此云馬住處已上十五經法也阿羅驃此云微鴦伽呪此云體阿吒摩此云第八阿樓那此云曉阿䨲波陀舍阿䨲者逐前波陀云句舍云一切阿䨲便闍那阿䨲此云逐前便闍那云分別字噁叉可云惡叉羅此云字名不流阿陀此云復次亦云名門阿寃可云阿䨲惡叉羅此云逐前字不流也善見律第一阿塔婆尼耶此云外道行法經阿陀毗陀此云事火安佉書應云鴦伎此云印已上十二外道法阿羅波遮那可云藍波遮那此云堪受設阿提阿耨波阿提者初阿耨波者不生阿濕渺涅摩此云石也阿他可云藒他論云義阿含此云藥五教反彌沙塞二十二阿羅密可云阿羅論云遠離五十三阿寃此云惡阿夜揵多可云阿瑤揵蘭多阿瑤者鐵揵蘭多者鎖阿耨大薩羅可云阿耨跋嗟羅此云隨念十誦二阿藍此云林阿䨲婆陀此云教彼阿利耶僧可云阿利耶僧伽此云聖衆阿毗干多可云阿毗歌蘭多律云長也釋云過也阿婆婁伽律云小白衆阿婆羅若此云蹉中阿羅婆此云不語阿毗曇婆沙阿㸸盧奢論云罵也阿羅此云取也阿地阿賖夜此云極悕望阿珊提亦云阿珊提訶此云無疑阿坻耶語此云不偷阿毗陀此云無智阿羅波遮那此云堪語阿䨲此云一塵阿婆輪此云無邊阿毗訶覽此云心喜阿惟樓尸利可云阿梨耶尸利此云聖吉阿夷梨衆可云阿梨耶此云聖阿伽婆荼傳曰第一已上二十一雜法名阿逸多可云阿時多此云無勝阿疇那菩薩無云無滅阿毗婆帝井此云毗跋致阿逸彌勒此云無勝慈阿羅彌勒此云勝慈阿維三佛此云大覺阿迦摩提此云無欲意阿夷陀摩此云命與上八菩薩部阿鞞跋致位亦云阿惟越致阿此云不鞞跋致此云退也阿純難陀此云真歡難陀阿波差浮彌此云無相遠地阿耨差婆浮彌此云隨恩地阿耆三般菩薩法性此云大具足上五菩薩位部阿𧽤波夷底此云極方便是菩薩行部阿難此云救喜阿夷陀此云無勝阿泥盧豆亦云阿那律此云無障阿説示比丘此云馬勝阿若憍陳如亦云阿若㸸鄰此云無智阿升迦此云無憂阿梨吒古譯云阿梨吒亦云阿梨瑟吒謂無患樹因樹得名阿利吒比丘此云無擐樹阿攝此云不誓阿毗浮此無勝阿耆達此云火與阿濕婆此云不安穩阿提目多可云阿提目多伽此云解脫亦云愛樂阿耆陀翅舍歡波羅此云無勝束髮阿闍梨此云末生阿浮娑此云長老阿濕卑摩訶摩男此云不巧大名聞阿𮠪比丘此云質直阿由波羅此云命力阿婆耶此云無特阿羅毗迦此云小語阿梨那密多羅可云阿利耶密多此云聖支阿拔沙門此云無罪阿亹賊奇此云無瞋腦何耆毗阿耆者火毗者棄也阿若都盧可云阿若都羅此云無親稱也阿輸實梁云馬宿比丘也阿梵和利可云阿梵摩婆利此云不淨護也上二十八比丘部阿練兒可云阿蘭若此云寂靜處阿羅波比丘尼此云不得阿奴波摩此云無譬阿臘毗此云國名阿難婆此云歡喜阿夷可云阿私多亦云阿自此云不自阿夷梨此云聖女上六比丘尼部阿婆迦此云不諂曲是沙彌部阿那含亦云阿那伽此云不還阿羅漢可云阿蘭那此云殺賊亦云應供阿闍梨亦云阿遮梨此云應行亦云應阿那波那阿那此云日亦云入波那此云去亦云出阿浮訶那羯磨此云喚來阿羅辟支此云道諦上六聲聞行果部阿跋提罪可云何鉢諦此云犯也阿娑詰略此云不脫阿羼可云阿羼摩此云不忍阿櫁羅沽此云不調上四罪障部阿耆達多波羅門此云火與阿升羅此云不勇阿吒摩可云阿私吒摩此云第八阿嗜婆羅門可云阿耆𮚞此云火阿捨婆耆可云阿首婆耆此云𮩹語阿樓那此云曉阿惟香真可云阿利真多此云不如意上七婆羅門部阿輸伽王亦云阿育王此云無憂亦云不化阿闍世此云未生怨阿婆那王此云無時阿㸸嵐王可云阿㸸樓此云不作阿婆羅提目佉王此云諦正阿脂王可云阿宣此云細滑菴婆梨王此云空安低牒王可云安低提此云淚天鴦伽王此云體阿遮太子可云阿羅羅遮此云供阿迦那此云不破阿耶翅王此云行上十二王太子部阿梨包吒此云不歡喜阿須利清信此云不勇上二優婆塞部阿䨲留陀優婆夷此云無部是優婆夷部阿伽陀仙人此云丸藥阿羅邏迦蘭此云懈怠阿私亦云阿私多此云不白阿伽多仙亦云呵竭多此云來阿周陀仙人此云不落上七仙人部阿耆多翅舍此云阿耆多者不勝翅舍者髮也阿和那健尼此云無衆也阿支羅迦葉此云無永阿伽羅訶那此云無熱也阿耆毗此云有火阿私羅此云非名菴婆羅吒此云八母阿宣婆迦此云無食求安仇利此云指鬘阿蘭迦此云鳥名阿耆婆梵志此云有火阿羅荼鬱陀迦阿羅荼云靜鬱陀迦者云獺阿闍羅翅舍欽婆羅此云不光鬘覆阿耆尼毗舍此云阿耆尼者火毗舍者入也鴦崛摩梵志可云鴦崛摩羅此云指鬘花也頞波羅延梵志此云姓也阿耆尼達多此云火與阿耆婆外道可云阿耆尼娑訶此云火葉上十七外道部阿薩陀臣此云不信是大臣部阿那邠長者可云阿那他邠陀此云孤給增一阿含十二阿羅他吱大長者此云財憧阿莵羅陀星名雜阿含三阿具利長者可云阿瞿羅此云不白央伽長者此云體上五長者部阿羅婆居士此云小語出曜經八是居士部菴婆羅婆利菴婆羅者樹名婆利者護阿梵波羅此云非淨護智論七阿䨲波麼此云無以為喻上三女人部阿那伽那應云阿那伽多論云阿那名無伽那云來阿羅那遮譯曰大阿那分提應云阿那他邠陀亦云那邠持譯云阿那他者孤邠陀者給也阿坻耶應云阿體野譯云阿者不休耶者欲取阿若㸸鄰譯云阿若者已知㸸鄰者姓也阿那律應云阿那揵陀譯云無曰障阿羅婆譯曰不語阿夷湍可云阿夷他譯云末也阿羅譯云無鬢阿毗羅應云阿鞞羅譯云無怨安闍那譯曰眼藥阿寄舍那應云阿耆膩毗舍那阿耆膩云火毗舍那云八阿耆達應云阿耆達多譯曰阿耆者火達多者與阿視毗尼乾子譯云阿視毗者不營資業尼乾子者無繫阿奴拔摩應云阿奴波魔譯云無以為喻阿跋吒譯曰滿復阿須譯曰𫘈阿濕卑譯云不巧阿婆跋陀童子應云阿婆跛陀羅譯曰阿婆者護跋陀羅者賢阿夷應云阿私多譯云不白阿梨吒譯曰無擐樹阿夷頭翅應云阿待多翅舍譯云不勝髮也阿波耶譯曰六時阿摩多多應云阿摩多多多律者云阿摩多者母也多多者父也阿羅吒復陀迦應云阿蘭若復陀伽譯云家諍水阿那伽此云不行阿私陀應云阿私多譯曰不白阿輸迦陀譯云無憂與阿梵和利應云阿梵摩波利譯云不淨護阿毗梨此云無精進阿周那人此云不碎阿低離此云無由阿莵闍阿沙應云阿搜闍阿賖阿竭經云當來安低疊應云阿泥提婆此云阿低者復提婆者天阿難陀此云歡喜阿濕婆誓此云不巧生色阿比羅提應云無勇與阿羅吒應云阿難那此云無賊阿梨利包吒此云不仙教阿由他人此云無伴侶阿蘭迦蘭此云國名也阿蘭那梵摩譯云阿蘭那此云寂靜梵摩此云障阿梨吒祭帝譯云阿梨吒者樹祭帝者國亦云聚上四十四雜人部阿支羅姓此云無衣阿提梨此云不阿波此云水阿修羅亦云阿須倫亦云阿須羅阿此云無亦云非修羅此云天阿羅婆迦鞞沙迦阿羅婆迦此云不斬鞞沙迦此云一切阿婆摩羅阿婆此云死摩羅此云花鬘阿毗釋迦山神此云極能阿吒二叉神阿吒此云行二叉此云應阿羅婆帝此云不得阿婆建茶可云阿婆提此云無病阿臘鬼神應云阿臘婆此云小語七八神部阿羅婆迦夜叉此云小語阿羅毗鬼此云國名阿跋摩羅此云無鎧阿鞞扇提應云阿毗産陀此云大漏上四鬼神部阿婆羅龍王亦云阿婆羅羅此云無流延阿迦羅龍王此云無頭阿耨達龍王可云阿耨達多阿耨此云小達多云與長阿含云無熱阿那婆達龍王亦云阿那婆愈多此云勢阿蘆可云阿盧歌此云明也阿婆羅龍此云無力阿波羅此云不護阿攝波龍王應云阿鎖婆羅此云馬力菴婆羅提陀可云菴婆羅提婆菴波羅者樹名提婆者天上八龍部阿羅勒迦像此云勝此像部阿由勒蟲此云不針阿闍迦羅蛇此云髯蛇上一蟲部阿毗地獄亦云阿鼻亦阿毗至此云無間阿羅邏此云因聲為名阿浮陀地獄亦云呵浮陀亦云波陀論云阿浮陀者少多有孔此云十德阿婆婆此云因聲為名亦云阿波簸地獄阿達多地獄此云不與阿喻摻波梨恆泥梨應云阿喻私鉢多羅婆南譯云鐵刀葉林上六地獄部阿羅闍世界此云無王阿樓那世界此云曉星阿竭流香世界此云沈香阿毗羅提世界此云不作阿尼彌沙世界此云不眴上五世界部阿頭摩國應云阿頭樓摩此云無樹安陀羅羅此云盲阿羅毗國此云小語阿羅鞞伽羅可云阿羅婆伽羅此云阿羅婆者不得伽羅者屋阿般提此云無義阿耆維國此云火阿尼目佉可云阿耆目佉此云火面鴦伽國此云體阿葉摩伽國可云阿炎摩伽陀阿炎者施摩伽陀者生阿槃頭國此云無親友阿那頻頭國此云無諦阿濕波此云不安穩阿波國此云平澤阿務波羅可云阿闍波羅阿闍者半婆羅者守阿和檀提可云阿婆檀提此云無罰阿濕波阿雲頭國可云阿濕比阿槃頭阿濕比者不巧阿槃頭者無親阿槃陀國此云護阿莵羅陀國此云星名安陀羅彌國此云蔭園阿彌羅國此云樂法阿莵耶此云似文阿波蘭多迦國此云邊國遏波此云小也阿毗羅國此云精進阿摩國此云不然阿摩勒迦波此云無垢相似阿那羅國此云大阿和提國可云阿婆提此云不論阿羅雞國此云垂髮阿莵羅陀國此云星名也阿頭佉國此云不若上三十一國土部阿監車多羅大城可云阿喜車多羅阿喜者蛇車多羅者徹也阿波布和城可云阿波斯此云無惡阿般大天城可云阿般叉此云無鴦伽膽婆城鴦伽者體膽婆者樹也阿伽留陀傳曰第一飯城阿吒槃劍律云鬼神城阿瞿陀傳曰蚖蛇城阿羅毗傳曰曠澤城阿婁陀傳曰無央城央伽富梨城此云體城阿波梨城傳曰營壁城上十一城部阿奴波跋耆也此云無多伴阿那頻色此云無滓上二色部阿羅迦聚落此云垂髮亦云勝是聚落部菴婆羅此云因果名也阿毗陀傳云無通村阿闍羅和尼可云阿闍羅波那此云不細林阿匝闍可云阿牟閻此云不動上四村部阿伽羅偷可云鴦伽羅偷婆經云炭塔阿婆耆梨寺傳曰無畏寺上三寺阿陸舍羅傳曰無病舍是堂舍部阿蘭若亦曰阿練若此云寂靜阿莵夷此云隨時阿遊婆陀尼可云阿細波陀尼此云無求上三處所部阿遮樓山此云不動阿羅陀山此云無聲頞多山此云行也阿呼山此云日也阿休何山此云鄉白也阿沙于那可云阿鎖歌菊那此云馬耳頞那山此云飯亦云母阿那斯此云無食處阿沙波山此云無呪術阿婆陀羅傳云西石山阿鞞耆梨傳云無鬼山上十一山部阿脂羅婆提亦云阿史羅和帝阿夷羅跛提河可云阿夷羅底阿耆羅婆婆阿耆者大羅婆者聲上三河部阿喻闍此云不相應阿夾江此云駚阿宣羅波帝夜江應云阿央羅波底此云阿央羅者駚流波底者有也上三江部阿那跋達也此云無熱阿耨達池可云阿耨達多此云小與阿練池可云阿蘭若此云不著上三池部阿毗闍此云天種暗婆婆利園此云麥𧂐安陀園此云蔭亦在林部阿那邠阿藍可云何那他賓荼陀私耶阿羅此云阿那他者孤也賓荼私耶者給也阿羅者園上四園部阿摩勒水此云無垢阿闍婆羅此云羊力上二水部阿耨風此云小是風部阿羅婆伽林可云阿羅婆分此云阿者不他羅婆分者語安闍那林此云花名阿摩勒林亦云菴摩勒此云無垢亦在樹部阿莵林此云小也菴羅林此云樹名也上五林部阿梨吒可云阿梨瑟吒此云無環阿菽迦樹可云阿輪迦此云無憂阿梨陀薑此云薑黃阿濕波他樹亦云阿舍波波他此云阿舍波者馬波他者腳殃伽陀此云休與上五樹部阿梨可云訶票陀羅律云薑是草部阿伽樓論云蜜香樹名此云不重是香部阿輪迦論云無憂花樹阿提目多伽此云脫亦云樂阿提摩多花此云阿提目伽此云樂亦云脫阿闍花子可云阿闍伽此云萌𬞥阿莵