切歡喜上三十二比丘部奢摩此云寂靜遮婆羅此云墮落舍鳩利可云舍鳩利此云上闍知羅此云𦵫髮舍夷㸸梨舍夷此云眼㸸利此云織亦云性上五比丘尼部沙彌尼此云息慈亦云淨養亦云淨命尼者女也三摩跋提可云三摩鉢低此云善定闍婆那此云疾智三摩提此云一心三婆羅住故此云律儀戒三般具足戒此云具足上六聲聞德行部三昧此云一心三術闍此云三彈奢摩此云舍摩他亦云奢摩他此云寂靜上三雜觀行部三藍披此云忿諍此罪障部嵯梨多色持律者云五大色聲論者云嵯槃多是外國音色此間語具足正外國音應云阿婆多跋那阿婆多翻為白跋那翻為色謂白色沙尼衣持律者云衣聲論者云應云沙師我反尼翻為樹皮衣此非土衣應云樹皮衣舍勒衣舊譯云內衣持律者云前後襜衣聲論者云正外國音應云安多羅舍多柯此衣四方縫作寂在裏著即世僧尼所著舍勒上三衣服部闍提弗多羅此云生子車多摩耶婆羅門此云淨心闍提輪那婆羅門此云生門娑羅婆羅門此云娑羅者實雲鶴名薩遮尼揵婆羅門此云實無繫三摩震諟婆羅門此云平等思惟闍提疏婆羅門此云生子上七婆羅門部闍那迦葉王此云成事薩婆達王可云薩梵馱此云一切施闍耶王此云勝薩和達王亦云薩和檀此云一切施薩婆達多薩婆者一切達多者與遮迦𭦯此云輪闍那梨沙闍那者入梨沙者牛王沙盧樹王可云娑羅此云樹名薩婆悉達可云薩婆多悉達此云一切事驗上九王太子部舍彌此云寂靜是優婆夷部闍梨仙人此云數法闍那駒仙此云能生奢摩子義仙人此云寂靜材祇沙仙此云樂勝薩羅薩佛可云娑羅娑此云白鶴上五仙人部薩遮迦六揵提薩遮迦者寶摩揵提者志求道薩區此云地闍提首那此云闍底者醒首羅者勇娑羅末梨娑羅者實末梨者花舍羅步可云舍羅破舍羅者箭破者瑫祥闍那可云若那此云知闍秪羅此云螺髮遮羅迦外道此云行食薩闍子摩納可云薩闍摩那婆薩闍者實摩那婆者行蛇陀長者子此云寶生薩支禪尼可云薩闍尼此云薩遮者實尼者生闍提蘇尼梵志闍提者生蘇尼者聞闍提弗多羅此云生子闍提舒尼梵志闍提者生舒尼者姓也上十三外道部遮那伽臣此云間事此大臣部散陀寧長者此云滿散陀那可云婆陀那此云有物沙門億耳長者沙門者息心亦云聞説彌沙塞律二十五上三長者部遮樓此云可愛亦云光闍梨此云納上二居士部捨彌夫人此云寂靜是夫人部差摩女此云安穩齊耶憂婆私此云齊耶者勝覆婆私者清信女也𨠦陀難提此云愛歡喜三摩竭女此云相會舍彌婆帝室此云舍彌者家婆帝者長上五女人部薩陀婆應云薩陀羅婆譯云涅闍那譯曰勝闍梨譯曰光遮樓譯云光薩羅陀應云徐羅陀譯云清白遮羅周羅那羅遮樓周羅那羅譯曰遮樓者光周羅者髮亦示也那著也薩薄王應云薩地婆譯云商佉沙羅應云舍羅譯曰屋傷佉譯曰珂沙迦羅應云捨迦羅譯云不行舍勒譯曰衣珊惹婆譯云有想闍致羅譯云縈髮三文達多應云娑物陀羅達多譯云海與遮羅譯云動薩若瞿妒路摩窂應云那闍夜瞿妒路摩羅譯云那闍夜者等勝瞿妒路者姓摩羅者花娑槾伽應云娑羅央伽譯云實體差摩伽此云忍也奢頭羅譯云虎珊檀那舍應云珊檀梨舍那譯云珊者正檀梨者舍那者久也薩婆達婆薩婆者蛇達婆者茅散舍婆樹名也索迦人應云釋迦譯云能薩埵薩闍多此云好髮舍那鳩摩羅舍那者樹名鳩摩羅者童子闍延多此云勝散闍像師應云那闍那沙多老目利此云樂山婆訶調應云娑訶提婆此云忍天舍羅人此云廣闍婆童子此云駃行闍梨亦云耶利此云有納章莵勒應云遮莵歌譯云姓釋羈此云天主幢殤坻羅應云檀坻羅譯云露齒玉曰殤詩羊切莎婆魁膾應云莎沙此云氣虛薩和善應云薩婆多羅經云一切慶也上三十八雜人部舍夷㸸離應云舍夷㸸利此云眼識奢致羅此云諂曲遮波此云弓舍持羅應云山持羅此云除苦上四雜姓部舍羅神此云箭也奢羅破仇羅神此云八腳種散脂鬼神此云聚車鉢羅婆此云輕動奢羅密帝奢羅者鎖密帝者友上五神部闍羅王亦云㸸此云縛闍尼沙鬼經云勝結使上二鬼神部娑竭龍王亦云娑伽羅此云海蠰佉龍可云商佉此云珂散㸸龍王可云商㸸此云珂上三龍部娑羅娑鳥此云白鶴薩婆車多此云一切覆娑羅迦鄰提娑羅者賓迦鄰者可愛提者與賒律提鸚鵡此云實可衆䁟蘭那此云廣察舍君陀鳥此云舍君陀者鳥也遮迦惒可云歌羅婆此云鴛鴦上七鳥部薩薄可云薩婆此云蛇闍盧亦云間樓蟲此云鮙娑伽羅目迦娑伽羅侮目迦脫上三蟲部賒摩此云青色賒娑羅此云班也上二地獄部娑波世界亦云娑呵此云能忍婆桴世界經云恐怖刪提嵐世界可云那提盧帝此云那提者節盧帝者也上三世界部舍衛國可云尸羅跋祇底尸羅者仙跋祇底者住處舍婆羅此云裸國大論二十五桑祇陀國此云桑祇哆者聚會説也薩婆伽羅鉢婆羅此云一切屋無節奢吒此云諂釋迦梨國此云沙沙訶國此云能忍遮摩羅可云婆羅遮摩羅者復遮摩羅者毦舍衛阿那仰祁可云尸羅跋底河那陀仰馱薩羅國此云池三彌佛利此云寂遮羅頗國此云行闍踰閲國此云不可戰遮勒國可云遮羅此云動沙祇國可云娑枳多此云論事娑樓婆國此云似陀沙竭國可云娑伽羅此云海精翅瓊國亦云釋迦此云能上十九國土部舍衛國可云尸羅跋底此云聞持沙竭羅傳云新木城舍婆提城可云尸羅跋兜又云舍衛此云仙人住處遮留波利傳曰白疊端也上四城部薩羅聚落此云樹名沙頭聚落此云好遮羅周羅那羅聚落遮羅者動周羅者小那羅者人上三聚落舍彌此云宿靜是村部遮和羅可云遮波羅此云動遮鉢羅塔此云遮鉢羅者動也遮婆羅寺可云遮歌羅經云轉也沙毗呵寺此云棄毒遮迦越羅此云輪圍上五寺精舍部薩簸此云池薩婆婆羅頗羅山薩婆者一切婆羅者刀頗羅者果松梨山此云動遮利山此云輪斫迦羅山此云輪薩鉢那求呵山此云薩鉢婆那者死尸求呵者窟薩婆燒持迦波披山可云薩婆燒治迦披此云薩婆者一切燒治迦者淨波披者惡薩多般那舊呵薩多者是七般那者葉求呵者窟車多迦山此云覆也薩多般那可云薩多般羅那此云七葉上十山部薩羅由此云駃流薩羅亦云沙羅此云實娑婆耶可云娑羅婆阿耶此云娑羅婆者聞阿耶者行舍勞浮此云箭薩牢此云湖奢多頭可云奢多頭樓此云石川流沙陸河此云娑樓此云實沙庶江可云沙樓此云實是江部薩卑尼池此云有蛇龍是池部沙摩尼水可云娑羅摩羅此云止息是水部釋難陀園可云釋迦難陀此云釋迦者能難陀者喜薩盧園可云薩羅此云救上二園部沙羅林此云勝舍摩利亦云晱娑利此云木綿薩羅梨林此云救上三林部薩羅此云松舍摩此云寂靜薩盧好樹此云賓薩遮若摩可云薩遮尼那摩此云薩遮者實亦云諦尼那摩者要斯上五木部薩羅波羅草薩羅此云動波羅此云護是車部沙羅香闍提花香此云生亦云實上二香部散多尼迦花此云寂靜散陀那花可云延陀那此云流沙羅華此樹名也舍那衣此云木皮差羅波尼可云叉羅波𮚞亦云讖羅半尼此云炭舍勒此云內衣釋迦毗楞伽此云釋迦者姓毗楞伽者不好色也三般衣可云生般那此云具足上五衣服部闍毗此云根藥舍利沙亦云尸利沙此云尸利沙者似頭闍婆藥此云大麥上三藥部舍梨漿根闍豉此云酒漿釋俱羅餅此云胡摩餅賒陀尼可云莎陀尼此云可噉沙利耶此云白米闍致此云穀也舍樓伽漿此云根上七飮食部釋迦毗楞伽摩尼此云釋迦者姓毗楞伽者不好也摩尼者珠也是寶部三摩耶此云時分三跛吒劫亦云三跋扨夷律云劫滅上二時節部已上出翻梵語集薩陀波崙大論九十六薩陀秦云常波崙者名帝是菩薩也沙羅婆譯云聞遮利夜譯云動論云行闍提陀應云私底多履反此云實與叉耶論云書也遮波利支提應云遮波羅折埵譯云遮波羅者動也折埵者功德聚也薩婆侈羅毗票多應云薩婆侈羅毗羅遐多譯云薩婆者一切侈羅者處毗羅遐多者不作上六雜法部散陀寧長者譯云漏也賢愚經五蛇陀長者經云寶稱散陀那居士應云娑陀那譯云有物捨殄夫夫譯云寂靜若摩女經云安穩沙呵此云忍三牟提耶此云集諦也闍莫迦芎藭索瞿者丁子薩洛計比脂出婆羅門珊闍子名也薩裒殺地此云蛇藥也薩縛達此云一切施也王名也薩利殺跛芥子薩折羅婆白膠香遮達國名也娑多婆訶王此云引正也釋摩男又云釋摩訶男今云摩訶那摩此云大名是甘露飯王子也薩婆達多名為蛇蓋實非蛇蓋強云名字也相傳賊草舍利伽鳥舍利可知伽鳥者伽陵頻伽鳥珊檀那舍王舍城中長者名也沙索男聲也柘鬪提隋云四方謂是僧處也舊云招提者訛略也昔人去鬪除奢復招柘兩字相濫久耳誤作云云薩陀此商也娑訶又云母陀羅此云主也莎廢此云善也娑伽羅亦云娑竭羅此云醎海也索泣謎羅此云無也如胡麻許大亦色堪染緋極火香也薩囉悉知婆底此云身識又云婆羅莎底薩剌輸若跢薩賴此云顯也輸若跢又云瞬若多空性斫迦婆羅山魏云輪山即鐵圍山也闍波隸魏云熾燃遮多婆他四交道也折利呾羅城此云發行攘那跋陀羅此云智賢闍耶舍此云藏闍那屈多此云志德三摩多隋云平等也娑伽婆書隋云特牛奢婆多羅跋多書如伏轉沙羅僧伽何尼書槐賢薩婆婁書一切種音上四書部六十四書內商多隋云家定者沙隋云求勝差利尼迦隋云出乳汁林沙羅洟隋云調御商佉隋云土塔奢摩羅耶那隋云雜色眼舍利隋云鸚鵡薩闍尼食五正食也一飯二麨三乾四魚五肉沙彌隋云勞之少者又云息慈也染之情以慈濟萬物也娑剌拏此云流轉也先云娑羅那訛也樞要上舍樓伽杲漿藕根是善見論出之已上出信行梵語集幾結仡囉二合蹉陌乞芻二合嬭嚩無撥反麼買訖哩二合娜步訖囉二合麼進訖囉二合麼返仡囉二合戚感以反執仡囉二合引賀畝乞差二合覩農訖哩二合使吟擬研以反引底田乞差二合怛覽二合舍仡哩二合賀忍乞鏟二合引底黔訖哩二合瑟拏掉乞差二合跛拏造訖哩二合也取仡哩二合佷拏二合惱訖𮀉二合捨寧乞敘二合麼頂仡哩二合引嚩帝乞剎二合怛哩二合也已上義淨千字文咽擬哩幡心訖哩二合娜耶黑訖哩二合史拏叉迦羅山擬哩畝訖麗怛羅又田也盡訖沙也癭訖㗚捨何知吉惹儞煩惱吉𭋤捨嗔訖羅馱盡訖叉庚買吉哩二合野取𭋤叻訖曩又云乳吉史二合羅安穩訖始二合麼春㘈哩沙長春𭋤叻賀鉢底黑分訖哩二合史拏二合博乞史庶𭋤哩誐三四月訖哩二合史麼二合天竺國因怒二合泥舍緊那羅歌神也𧏞蜋訖哩二合瑟拏二合波羅摩羅蘇折迦黃精乞施二合羅迦上罽微舛麻訖哩二合瑟拏傷乞史多舍㘈叻訶鞭乞施二合波脆訖陵二合上多烏鹽訖哩二合瑟拏二合攞縛拏褌者攞曩又云禁銘曩須臾乞沙二引拏已上出禮言梵語雜名地歌神黑歌神女蘇投又地宅歌緣乏米物心室頂金翅鳥已上全真譯祇夜亦云偈此云重説是經法也菊少厥嗟此云不好鎮亦云不成是雜法部耆利摩難此云山慢耆婆伽此云命行耆多此云歌戲耆尸婆羅此云山蔓藻毱提此云護已上五比丘名機梨舍瞿曇孫機梨者𭙷瞿曇者姓基利陀此云煩惱亦云苦已上二比丘尼羈由羅欽婆羅衣聲論者云正外國音應云枳由羅翻為細甘婆羅翻為毛衣耆闍崛山舊譯云應曰耆闍崛多耆闍言鷲崛多言頭謂鷲頭祇陀太子可云此云勝機里毗王可云機里寐可云有次第耆婆醫王此云命亦云壽是大臣也汲闍鬱多羅此云曲𩒐勝欽快盧梵志此云樹名也已上二外道名枳羅蘇可云枳羅婆此云自也是山也耆梨山此云山也祇樹園亦云氏哆亦云祇此云勝也祇洹林可云氏多槃那亦云祇多那氏多者勝槃那者林也那氏多者勝耆羅闍那此云水中生是草名欽婆囉此云黑毛衣服部出羈舍譯云髮吉由羅莊嚴可云枳由邏此云瓔珞是寶部祇陀譯曰勝也耆婆律曰活童子譯曰命耆婆伽譯曰壽者亦云命者耆婆羅譯曰壽命耆婆先那譯曰耆婆者命先那者軍耆婆先童子此云耆先者壽已上雜人名耆梨龍此云山也龍部緊那羅此云是人非人是雜狩部耆婆耆婆鳥此云命命耆婆鳥可云時婆時婆者命也祇洹精舍可云氏多槃那氏多者勝槃那者林耆婆㸸摩羅耆婆者壽亦命㸸意童祇那比呵羅可云是多婆那此云勝林寺耆菟仙人此云勝是仙人部跋波譯云父耆梨譯云山祇陀槃那應云氏多槃那譯云勝林祁披應云祁婆譯云命者祁梁夷反吉蔗應云吉里遮此云事是鬼神部吉羅羅律云竹笋是飯食部已上一處所部出之已上出翻梵語集訖栗枳居紙反迦葉仙父王名也出玄應音義祇夜和那應云體夜婆那譯云偷林耆羅譯云天敢紇多神名也璣𭊘尼龍子名也九韶舞樂名也舞能繼堯之德時招反呬摩呾囉此云雪山王石訖利多此云買得呬呾羅𡱝那此云上軍郢祁居梨尸隋云憤瘦吉利尸隋云瘦細已上出信行梵語集蛉蛇色持律者云五大色聲論者云蛉蛇是外國音也具音應云柯羅跋那柯羅者翻為黑跋那翻為包謂黑也穹伽陀持律者云五大色聲論者云外國具音應云比多跋那比多是翻為黃跋那為包出翻梵語由武喻馱雙庾誐攞戰庾馱入舉愈誐已上義淨千字文庾伽遮羅浮迷修行地惟闍師利此云勝吉維末坻可云毗摩帝此云疑亦云種種意維那此云寺護也維摩羅羅𮞳移經云離垢威也是雜人部由乾陀羅山此云雙持由乾者雙陀羅者持由提迦花此云行也由旬亦云瑜繕那此云五百弓為一㸸盧舍八㸸盧舍為瑜繕那十住心論云梵云踰繕那此十六里云由旬由延者皆訛略也維提應云毗提此云智也雜姓部維睒文應云毗瞋文此云消息神部維婆蟲可云拔那伽此云蛇維耶離國亦云毗舍離亦云毗邪離此云廣博踰尼此云生國部臾那世界律曰漢地已上出翻梵語維祇難此云障礙已上信行梵語集虱庾舍修造喻駟曩雙庾誐攞戰庾怛遮二合舉庾誐太子庾誐羅惹已上出禮言梵語雜名一驛里也戰少年已上全真譯喻沙譯云和水煮乳為喻沙出文殊師利所説宿曜經上卷女聚謎攞米尼剎利此云彌尼者輪剎利者姓也已上出翻梵語集脂謎娜邪銘闥也招茗捺哆雲銘伽白羊謎沙聚迷哩已上出禮言雜名躬彌樓肩佛彌樓者光彌樓揵馱佛彌樓者山名揵馱者香也彌喜揵尼如來可云彌多羅耶尼此云慈行已上四佛號彌沙塞部此云大神通亦云能別是佛教部也彌帝隸力菩薩此云慈彌妬路此云意彌妬路刀利此云慈力密帝浮彌此云友地是菩薩地彌奚此云浮雲已上三菩薩名彌醯若此云大天王彌陀羅此云知識彌多羅此云慈彌耆耶亦云彌祇迦此云雨雲已上五比丘美摩比丘尼此云安穩密多門此云親友彌寧此云習諦是聲聞道法彌羅拔羅王可云彌多羅婆羅此云慈力彌佉羅母此云金帶是優婆夷也彌多羅達子彌多羅者慈達多者與也是外道也彌迦女此云雲也是女人也觀佛三昧經二彌樓山此云光彌伽園此云雪彌薩羅林可云彌伽薩羅彌伽者重薩羅者救彌尼迦婆那此云雜林是樹部出之彌離頭揵提此云儒香是花部出之彌呵羅寶可云彌阿羅此云金帶寶部彌伽槃荼應云彌槃他譯曰雨露是雜人部出之彌伽迦利彌伽者雲迦利者黑亦云時彌迦弗應云彌力迦弗多羅經曰麻子已上三雜人部彌寧跋耆應云彌那跋耆彌那者魚跋耆者種彌尸利此云我吉已上二雜姓彌樓相世界此云光明是世界名彌梯羅國此云量彌稀羅國此云金帶彌尼𢷳國此云山名也彌提羅國亦云彌梯羅云分住已上四國土也密締羅城此云懈怠彌綺羅城此云金帶已上出翻梵語集密多羅譯云周旋是外道法彌留馱滅此云滅也彌伽遮迦書諸獸音彌迦那隋云一者彌遲伽隋云土塔已上信行梵語集尿根死獸魚虛妄者已上全真譯志立悉體他以反二合女悉怛哩二合引教式乞叉左上素涅吠二合多摽止即以反賀曩二合引砥始攞引命爾引尾擔碩始攞圖質怛羅二合羯磨璨室𮀉二合瑟姹二合母娑引囉思振多心質多信室囉二合馱引截質怛哩二合旌止賀曩二合對怠引嚩曩急姑伽羅二合功室羅二合麼怛嚩二合縫枲引嚩絶親去曩嶺始佉羅峯始佉上囉戒絶引羅界枲引摩引開枲引播散地却尊室𮀉二合瑟姹二合頭始羅錦質怛囉舌爾賀嚩二合疆枲引麼早施伽羅二合唐斯曩穴七捺囉二合脈枲囉唾室𮀉二合澀麼二合已上義淨千字文佛日黃丹烏頭毒夜夜樹頭蠟頂舌師子座師子活成就行女寒沙活綾錦女人焰勝脈戒已上全真梵唐語室利大日疏一云室利翻為吉祥或云妙德或云妙音惹那摩提此云智意師利摩提此云吉意惹那師利此云惹那者智師利者吉已上三菩薩尸棄佛亦云式詰尸棄者大亦云勝悉達多此云驗事亦云驗義大論第二云悉達多秦云成利須扇多佛亦云須刪多此云好寂靜悉達阿䨲此云成辨私訶摩提佛此云師子意悉荷陀那佛可云私訶那陀此云師子孔已上六佛號之部尸梨伽那尸梨者亦云德伽那云厚也佛功德也大論云云秦云厚德室𭈩吒那殾叉耶時日提索滅解脫經也是經法也已上二經法也尸叉罽賴尼法可云式叉歌羅尼式叉者學歌羅尼可作尸賒婆枝可云勝賖婆此云木四分律支聞律云觸為初也支提此云覺雜阿毗曇心下斯尼喻此云軍人私頭那提此云河名也已上六雜法部尸羅此云戒亦云善性是菩薩行也尸梨崛多尸利者吉崛多者藏也亦云護尸梨耶婆此云吉行尸利躓此云吉意尸羅跋陀羅此云戒賢斯尼此云畢也尸羅世質可云尸羅修旨此云淨戒已上十一比丘名翅舍佉橋曇比丘尼此云多髻性祝那沙門此云碎也尸利沙遮羅尸利沙者頭遮羅者動已上二比丘尼部式叉摩那此云學脂梨沙彌尼此云脂者衣支梨此云小也已上沙彌尼斯陀含可云斯己理他伽寐此云往來是沙門果也指婆羅此云衣深摩根衣持律者曰是上價衣聲論者正外國音應云數飮摩牟羅藪欽摩翻為細衣牟羅翻為根謂根細衣斯那婆羅門此云軍斯樓此云名山已上二婆羅門也尸毗王亦云濕鞞亦云尸比此云有安穩肆吒此云聰了外道尸婆此云安穩斯那道志此云軍已上三外道名質多羅長者此云種種亦云星雜阿含二十一尸利崛可云尸利崛多亦云尸利仇多此云吉護菩薩所胎經五羡那長者可云斯那此軍也尸鉗城此云無質多長者此云心私呵昧經私呵昧長者子可云私哥昧底此云師子意私呵昧經私呵味長者此云師子意翅跋多居士子此云聚魚尸利夫人此云勝亦云吉尸婆離可云施婆羅此云蘊藻是女人失收摩羅魚此云殺子翅頭末城可云翔兜摩底此云有憧尸那竭傳云雜城尸婆私呵難比丘此云師子歡喜質多舍利弗質多者心舍利弗者如上悉伽符可云悉伽婆此云聽利私婆可云尸婆此云安穩師質可云首多此云淨私伽羅母比丘尼此云山𮎠尸羅遮那比丘尼此云弟語升迦羅比丘尼可云升歌羅此云好時升迦摩納婆此云鸚鵡季火淨行悉達太子此云一切成也升離女可云首陀此云白尸陀佛度譯云不解尸婆應云尸婆迦譯云安穩亦曰樂質多譯云意名云心尸婆摩提此云安穩意尸婆弗多羅亦云尸婆利子譯云尸婆者安穩弗多羅者子也只尸譯云有髮私呵毗羅像師譯云私呵者師子毗羅荼者脫真闍譯云聚私呵毗羅淖應云私呵毗羅陀譯云師子聲也尸利跋應云尸梨跋陀羅譯云尸梨者吉跋陀羅者賢尸休羅譯云勝持私陀此云曰共收摩羅此云殺子亦在魚部尸利提多迦此云吉護尸梨此云志尸梨婆應云尸梨槃此云吉得私訶昧應云私訶摩底此云師子意上十七雜人部尸婆羅鬼此云蘊藻是鬼神部辛頭龍此云河名私陀龍王此云河名上二龍部翅羅可云㸸翅羅此云從聲為名是鳥部枝提𤸑亦云支陀此云技提𤸑者衆蘇翅毗尸國可云歌毗尸此云何者入羅那世界國律云漢地史那亦羽唐真旦可云脂那亦云震旦此云漢地私呵國此云勝尸利調國可云尸利提婆此云尸利者神吉提婆者天上七國部尸婆富羅城此云尸婆者安穩富羅者城也尸鉗城此云無為尸法城門此云尸法者最勝亦云髮也尸那竭傳云新城翅頭末城可云翅兜摩底此云有幢上五城尸斯那村此云軍亦云勇是村部尸收摩羅山此云殺子支帝耶山此云聚支提耶山此云受尸梨漫陀傳云衆夫人尸梨此云吉支多奇梨山此云功德聚山支多耆利傳云嵯峨仲山上七山部私陀河可云私多亦云悉多婆羅此云冷辛頭此云驗斯那川此云軍是三河部尸婆羅水此云無勝是水部尸利曼茶羅林此云尸梨者吉曼多羅者圓尸陀林亦云勝金婆亦云尸尸婆此云賢實申怒林可云申怒婆此云實上三林部尸梨沙樹亦云師利沙此云頭尸迦羅樹此云不黑亦云不時師羅樹可云尸羅此云名尸舍和樹可云升舍波此云實樹質多羅波吒梨樹此云質多羅者種種波吒梨者重花質多羅他可云質多羅羅咃此云質多羅者種種羅他者早上六樹部尸婆梨草可云施婆羅此云蘊藻是草部尸梨沙果此云尸梨者頭沙者似是果部翅彌樓欽婆羅衣持律者云譯色衣聲論者云應云靃還甘婆羅靃還翻為白羊甘婆羅者為毛衣深摩根衣持律者云上價衣聲論者云正外國言應云數欽摩牟羅藪欽摩翻為細衣牟羅為根謂根細衣指婆羅此云衣真誓梨草履此云真誓梨者細聲上四衣服部私多監此云白色是飮食部尸利迦寶此云吉是寶部已上出翻梵語集支夷譯云支夷者聚十誦律支鬪律云觸為初也尸叉罽賴尼佉應云式叉歌羅尼譯云式叉者覺歌羅尼者可作四分律十五私呵末長者應云私呵摩帝亦云私呵昧譯云師子意出道樹經翅跋譯云取魚阿毗曇毗婆娑五十六尸利灑此云塔昏樹尸婆離應云施婆羅譯云蘊藻涅槃經二十一室利薜瑟揭迦是松脂也尸毗王此云與也室利毱多此云勝密也人名也私斯尼夷女聲也尸羅阿迭多王唐云超日至那尼此云漢持末室利提仳室利此云吉祥提仳此云天女至那漢底此云漢村尸禮他達羅二合遮羅婆訶上聲那此云長者子流水至那羅闍弗呾羅此云漢王子室利羅多此云勝受愼那弗多羅此云勝最子質多羅魏云雜地尸佉浴迦此云須髻持又云執髻持又云執髻即頭上人微支疆梁樓此云無畏尸利密多此云吉友真陀末尼此云如意寶珠室樓多頻設底㸸胝此云聞二百億古云優耳者謬悉達隋云成利斯那耶那隋云將兵尸利跋陀隋云德賢脂那國書大隋已上出信行梵語集脈始羅泥茗唾施隸二合史也頂始羅舌爾賀縛二合腿白室制多叫止迦去𭋹聲施物馱二合聽室哩女又室欏嚩拏執旨摩㘈羅訶熱駟嚩囉斷叱捺娜儞底催始佉覽急始竭藍心指多信室利儞弟活爾嚩無恥悉瑟吒播錦指怛羅二合女人悉𠲮哩畫只怛羅教始乞史二合尾思指底學始乞史二合哆嶺始佉羅漢國支那泥舍舍衛室羅二合嚩悉底師子枲伽兔始始迦貓指吒羅鳳爾嚩爾嚩迦棗悉止松止拏𦬔止毗拏乾薑室哩二合誐吠羅旗毒縣始誐大瓫始攞開室嚕底衣至縛羅孔嗔上捺羅梯始尾愼惱指多去庇拏久指羅十一月十二月始始羅酢草只泥誐二合理已上禮言