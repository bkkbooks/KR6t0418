閉怛羅羅屈吠膩抃吠那哩已上禮言梵語雜名關南方西方鼓琉璃已上全真千字文便闍那此云分別字是外道法米尼剎利彌尼此云輪剎利者姓也王名也偏多陀林可云陀林摩此云石留是林名也吠摩質呾利此云漓書八文其形也蔽迦蘭那此云耳也已上出翻梵語蔑戻車此云樂垢穢此等人令不識佛法吠舍佉月後半八曰踰城出家當此二月八日又云吠舍佉月後半十五日當此三月十五日已上信行梵語登羸訥麼攞醜訥嚩無撥反拏重儉訥僻乞灑二合引苦耨佉上玄努囉嚩冒馱遠怒引囉難訥娑迦二合囉欣覩瑟吒二合歡覩瑟吒二合桝覩唵二合母嚕頗羅濯度嚩耨妬攞引以臭訥巘馱香度波管覩唎喜覩瑟吒二合牙能上娑吒囉引衡覩理也二合以梵唐文字合點了已上出義淨千字文牙能瑟吒羅二合臭訥誐馱醜訥𡃤嚩𡃤喃又阿勢嚩曩惡訥囉嚩喇拏苦訥佉弱訥喇麼攞汝怛嚩又悉怛嚩又怛嚩也女度呬多媒怒底使度多霜覩沙引囉塵度哩又囉惹煙度麼吐火羅覩貨羅灸怛吠無背反苦努企哆已上禮言梵語雜名門知足天也女喜惡夢惡想貌屠兒罪過裂破已上全真千字文醜羸儉難恥香次已上全真唐梵文字曇樂曇無竭可云曇摩伽耶曇摩者法伽耶者泉信行云兜舍譯云粳也兜沙陀羅經此云歡喜精進兜沙陀比經此云歡喜長者已上二法經兜舍此云粳兜迦他可云兜羅迦他此云同語已上二是雜法阿毗曇毗婆沙第二十曇摩師利此云法吉曇摩迦此云法身已上二菩薩部曇摩陀經彌此法與地是菩薩地曇摩留枝丘此云法樂曇彌此云頑鈍也土羅此云土羅煮曇摩波羅可云曇無波離此云法護曇無德此云法度亦云法濟鈍毗帝須可云豆毗帝沙此云不可説曇摩掘部曇摩者法掘多者護曇摩難提此云法喜曇摩世利可云曇摩利此云法喜曇摩苾提可云曇摩跋提此云法僧曇摩迦留比丘此云法時曇摩羅叉此云法護曇摩沙可云達摩耶舍此云法名聞曇摩練兒此云法靜曇摩末底道人傳云法意已上十六比丘曇摩提耶亦云曇摩塵那此云法與曇摩摩提可云曇摩帝此云法意曇摩埤比丘尼此云法念已上二尼部突吉羅此云惡作登單那陀此云難可已上二罪障都多耶弗羅婆羅門此云利子是婆羅門部兜沙羅王此云霜曇摩鉗太子此云法行曇摩留支王此云法樂五教反已上三太子部突目佉此云惡面曇摩葉此云法都提夜子此云父名已上三外道部曇摩美長此云法軍應云曇摩斯那賢愚經第六同第十二曇摩世質長者此云淨法已上二長者部曇無勒詰多應云達摩洛起多譯曰法護頭樓摩此樹名已上二雜人部童籠摩亦云乙崙摩論云樹也曇摩拔羅此云法力已上二神部曇無和羅應云達摩婆羅此云法護是鬼神部德叉迦羅龍王此云視毒是龍部兜呿羅論二十五日小月氏也曇羅國此云邊郁伽支羅可云郁伽羅支羅郁伽羅者猛支羅者小曇密羅國此云樂法已上四國部信行云徒摩隋云名特叉尸羅隋云削石得叉尸羅城此云疑石是一城部都夷婆羅聚落可云都提此云判曇摩羅若傳曰法林是林部兜羅花兜羅花綿也騰沙加花此云已上二花部已上出翻梵語集頭吃想妬應云獨呵那妬譯曰苦邊書兜迦他應云兜羅樓詐反兜羅錦此云綿兜那鉤兜那者國名也已上二衣服部曇摩僧僧伽尼耶譯曰應法衆已上三雜法衆部咄者桂皮業部咄略同一種國王名部都梁香蘭也又縣名也有小山山上悉蘭俗謂蘭為都梁即以縣為名敦浮樓乾闥婆王名也其王有女字須跋陀曇無竭此云法涌又法上此云法魚曇無德此云法藏德叉迦此云多吉曇摩蜱此云法受杜魯婆跋吒此云帝散曇柯迦羅此云法時曇摩持此云法惠曇摩耶舍此云法稱曇摩密多此云法秀曇摩伽陀耶舍此云法生稱妬路可云年睺妬路此云三十羅婆名牟睺妬路禪經曰論一亦夜已上出信行梵語集途盧檀那隋云解飯逗迦應云豆佉此云苦也曇摩僧伽尼耶是翻梵語雜法特叉尸利國此云特叉者勤尸利者吉曇摩阿蘭若處此云法寂靜已上翻梵語集半留遠和加與太禮所多羅葉津禰奈良無宇知麻底攞底哩縒長儞寧一反伽上晝儞寧以反嚩引索雷禰縛𮓌惹底丁以反吏儞寧以反尾羅閲涅哩二合瑟置二合操涅哩二合荼重與儞泥以反也擔引見涅哩二合瑟吒二合唐梵文字合點了已上義淨千字文住底瑟吒二合又云悉地多惱儞尾𮓌曩三嘻哩二合拏麻三生嘻哩惹底晝儞嚩娑日儞嚩燈儞播烏麻底攞戟怛力戌攞已上禮言雜名二三方𣗥柴點黶三芥子油日三種成就行三時每日三宿晴緊雞苦依女又請又明又漢驚誠青草已上全真千字文偷羅難陀比丘尼偷羅者大難陀者喜偷羅闍菩薩法住此云大王是菩薩地部偷蘭難陀此云大喜地婆比丘此云馱行地伽那此云不長已上三比丘部偷蘭遮此云大罪是罪障部治牟留此樹名是外道部鍮婆應云杉鍮簸譯云塔是雜人部縶民伽羅應云低此云天魚雜人部沈摩崛應云曇摩崛多此云法護雜人部偷羅厥叉可云偷羅厥蹉此云大姓偷羅㸸吒偷羅者大㸸吒者頂已上二國部偷波可云私偷波此云塔是精舍部治耶曲處治耶者迅行也是處所部鎮頭迦此云柿樹是果部已上出翻梵語集珍頭迦林柿果林姪利瑟吒此云前見知嚕此云作已上出信行梵語集涅瞿衫是長之聲大日疏一池婆闌梨迦林池婆者平譯闌梨者燒也利忠哩儒而祖反通㗚地仙哩使寫理佉上章理佉入已上出義淨千字文鍮石哩底丁以反仙哩始豺哩乞沙二合蟣哩乞史二合刀子㗚利也已上禮言梵語雜名形少已上全真千字文通書又忠寫已上出唐梵文字利師達多富羅那利師者仙達多者與富羅那者滿梨羼達多此云仙與離婆多是星名已上二是比丘部梨熅可云梨熅毗此云王姓梨那王此云勤離車可云離車毗亦云梨車毗王此云細滑角牛也滑此云白飯梨師跋陀王此云仙賢已上五王部是仙與部梨羅此云女離梨車女可云彌梨車此云樂五教反垢已上二女人部梨包吒此云仙鄰那譯云解息教五教反是雜人部梨師槃陀那精舍梨師者仙婆陀那者面離越寺可云離婆多此云星名已上二寺部輪波摩彌花亦云輪婆摩耶此云可愛是花部律羅鉢多寶可云伊羅鉢多羅此云香葉離兜經云二月為節一節名離兜是時節部已上翻梵語集曰妍雅論輪屢那譯云聞是雜法部利羅譯云妍雅智論第三離車女譯云細滑支彌沙塞律十五上二女部林邠樹名履柯又云延利嗥此云舍梨薩婆曷剌他悉陀此云一切義成就古云悉達多者訛略也梨伽波羅值梨伽書往復梨沙耶娑多波比多書諸仙首行已上信行梵語集怒留盧舍那佛此云勝眼樓經佛此云樂上二佛號盧耶那包可云盧遮那此云牛黃樓伽盧醯尼此云苦蓮上二雜法部盧脂那此云牛黃盧夷強者此云河名是比丘留致利此云懶是罪障留陀羅王此云成猛是王部留支大臣此云樂五教反是大臣部樓脂譯云樂也是雜人部樓陀天此云可畏是神部樓醯那村此云長是村部樓毗此云可愛是國部盧舍彌花此云黃花樓遮摩那花此云可樂上二花部已上翻梵語集道唇汚瑟吒二合和禮舊云和南已上曰多迦經此云勝也佛經部已上出翻梵語和波陀論云語言是雜法部和修達此云寶與應云和修達多比丘部和伽婆此云有功德和須密可云婆須密多羅亦云密多羅婆須者此云好密多羅此云知識和秀槃頭此云寶親友和難此云大喜已上五比丘部和上此云知罪知無罪是聲聞和利長者此云護曰多迦經此云勝也是佛經部和修吉龍可云婆修堅婆修者寶也堅者有也和伽波可云跋伽婆此云姓也是樹部已上翻梵語集文曆二年歲次乙未五月十寫
