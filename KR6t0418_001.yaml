body:
  text: 多羅葉記卷上伊呂八仁保登千利奴流遠和加與太禮所津禰奈良武宇井乃於久也萬芥不己江天阿左幾由女躬志衛比毛世須伊遮伊上乞芻二合此伊上賀上聽伊上縒上底儀伊哩也二合引跛他上豈伊引縒欲一縒愛伊瑟吒已上出義淨千字文愛一瑟吒甘蔗一乞芻二合此翳賀又翳難又翳哆富伊濕嚩二合羅已上出禮言梵語雜名柴青頗梨欲此聽豈愛已上出全真唐梵文字伊寧此云苦諦聲聞觀行伊尸延亦云倚尸延此云膊佛功德名也郁迦長者經可云郁伽羅此云勇是經法部伊帝曰多伽是經法部亦云一築多陀此云如是語育多波提相應論也是經法部億力毗陀此云呪願智也阿毗曇毗婆沙第九是外道法部伊沙那此云自在是雜法部伊羅槃那此云伊羅者香槃那者林雜法部育多伽此云和合出彌沙塞律第一雜法部育多摩尼育多者相摩尼者漫雜法部意毗陀此云憶智是雜法部因陀羅迦羅此云天主時雜法部因陀達菩薩此云天主與因垢達此云天主與菩薩部意師多此云愛樂比丘部因哆此云脫比丘部因陀堀此云天主護比丘部育多婆提此云相應説比丘部因陀摩羅此云天主垢可云因陀羅摩羅比丘部因陀摩那此云伏天王比丘部因提闍應云因陀羅闍此云天主兒是比丘尼名也郁伽帝優婆塞此云大功德伊沙可云伊履沙此云嫉妬羅障名也郁伽怛佉優婆塞郁伽者大功德恆佉者河名也伊羅鉢三昧此云藿葉者也雜觀行部因陀婆彌王可云因陀羅那此云天主林也伊尸耶仙人此云鹿膊郁伽蘇跋那長者郁伽者威德蘇跋那者好色也出十誦律第四伊那婆那此云王林是佛名部因提書可云因陀此云天王外道法也伊舍羅譯曰嫉妬伊吒地婆神此云念王因臺羅神應云因提羅此云天王伊羅鉢多羅亦云伊羅鉢伊羅者香鉢多羅者葉因那羅人此云天主雜人部伊那般那可云因陀羅般那因陀羅者天主般那者林伊那婆羅可云因陀羅婆羅此云天主力也伊羅提那伊羅者香婆那者林龍名也伊羅漫龍此云香行伊羅轅裊可云伊羅婆那此云主嚴伊羅鉢那裊應云伊羅鉢多羅此云香葉伊羅漫蛇此云疾行一刃鳩王一刃者甘遮阿鳩王者鼠也因陀羅網因陀羅此云王世界名也因陀此云天王倚脾波國此云員也因陀羅尼羅此云天王青寶一慈園此云石城伊車能伽羅此云樂耕郁伽伽羅村此云威德伊沙陀羅山此云自在持乙師羅山可云伊沙陀羅此云小刀伊説多此云樂也樹名也已上出翻梵語伊私耆梨可云梨師耆利此云仙也郁耆應云郁耆羅此云畏羅雜人部因提書應云因陀羅譯曰天主阿毗曇毗婆沙第四卷外道法部因陀羅譯云主中阿含第三十三雜法部郁伽長者亦云優伽譯云威德出大涅槃經第七長者部伊寧奴定反苦譯是女人部因達羅喝悉哆曰及香藥部伊葉波羅此云自在伊濕伐羅此云自在伊唎史二合他此云欲樂已上出信行梵語集伊篩羅山此云仙人住處因沙舊山經曰帝樹名室伊㩢末提河此云伊羅樹此云香也因多羅此云脫伊師迦草此云虎鬢伊蘭此云香育泥花此云相應伊羅鉢藏可云伊羅鉢多羅此云香葉因陀尼羅論云青珠也此云天主黛珠因陀羅幢寶此云天王伊那羅寶此云火也郁伽支羅可云郁伽支羅郁伽羅者猛支羅者小國部也路赤路多瞋嚕瑟吒二合色嚕引跛哀嚕娜曩覩毛路摩引血嚕地羅毫名摩曩二合嗢引囉拏二合已上出義淨千字文毛嚕去引忙色路引去波赤路引呬上多哀嚕娜曩銀嚕比也金鐵總名路引賀世界路迦馱引覩狼嚕摩賀鶴嚕惹慳路婆號哭嚕娜底瞋嚕瑟吒又泥沙已上出禮言梵語雜名祿色端瞋界已上全真千字文書衙毫文惱端正已上全真唐梵文字哭喜貪路迦憊可云路迦鞞陀路迦言世憊知也路迦那陀此云世尊大論第二路伽偈此云世間盧耶那色可云盧遮耶此云牛黃樓伽盧醯尼此云黃蓮盧夷強者此云河名盧脂那此云牛王是樹部路伽耶陀此云世間行也聾摩奢可云盧摩奢此云多毛盧醯比丘此云國名勒棄多此云守護勒佉菟可云勒佉𭇎莬勒佉云狐𭇎莬云香樓醯那沙門此云光耀也勒叉那此云護盧耶那色正外國音應云盧喜多盧喜多翻云跋那赤跋那翻云色持律亦云五大色盧臘地獄可云盧羅婆此云可畏聲露遮此云眼亦樂五教反嚕醯遮此云鯉亦云國名波羅門名也勒那跋彌王此云寶鎧勒那識祇太子此云寶經勒娑婆此云有護外道名也勒那闍耶此云寶勝勒那翅奢此云寶髮緑利密多應云修利密多此云曰友盧迦延應云盧迦延那譯云世法邪見盧頡多傳曰赤土城也盧伽比丘古譯云盧伽謂失也病聲論者云盧伽翻為惡患亦病盧醯尼藥等此似黃蓮盧脂那此云牛黃樹部也盧健此云黃蓮樓醯那村此云長帳雨反已上出翻梵語路伽耶論譯曰世間外過法也花首經第八盧醯呾迦此云赤盧醯多柯蘇臭隋言閉塞城勒那摩提此云寶意已上出信行梵語集路伽億路伽秦云世億名知出大論第二已上出信行梵語集嚕多是大聲大日疏一楞伽利此云耕地樓遮摩那花此云可樂盧遮彌花此云黃花盧遮那花此云眼也楞耆此云色樓脂譯云樂雜入部已上翻語集波圓跛哩奔怛拏二合出義淨千字文地跛哩二合體他以反尾引風嚩引庚雨嚩燕音反灑西鉢室止二合麼相跛羅娑麼二合曪輔鉢曪二合底嚩馱竪嚩攞品跛哩嚩撫鉢曪二合娑引娜甥婆引擬寧也異跛哩二合詫迦半音鄰跛哩弟史奉鉢哩二合拏引麼朋博乞灑二合入山鉢嚩多萬鉢羅陛娜商嚩抳惹準上迎鉢曪二合底也二合引誐麼曩入鉢曪二合尾捨店鉢曪二合娑引羅妍鉢羅二合娑儞寧以反迦強麼攞嚩虎重節鉢曪嚩二合重蒙鉢曪二合娑引娜得跛𮑱菴反多酬鉢曪二合底布引惹引寸婆引誐希嚩曪響鉢羅二合底攝波娜二合大摩訶應鉢曪二合底庾二合多羅煮跛左上哲鉢曪若拏句跛娜朝鉢曪二合底庾二合灑道跛他上聰鉢曪二合惹拏二合賢跛捺曪二合石播灑引拏渠嚩引賀驗鉢曪二合底也二合乞灑二合提鉢羅二合尾左也落跛底多浮跛攞二合嚩易跛哩襪無撥反多重器婆引惹曩暢鉢曪二合尾吠迦羽博乞刃二合雅鉢羅二合始儞二合迦墜跛底多辭嚩迦半音縈跛哩弟瑟吒二合驗鉢曪播多好婆上攞重要鉢羅二合喻惹曩懼婆上也欺跛哩婆上嚩微跛曪麼機嚩引仰弭二合引服嚩引虎翼發虞曩博乞刃二合果頗攞首鉢曪二合他麼胸嚩無縛反乞灑期鉢羅二合底曳二合迦飯薄入多弼跛里左引曪迦熟博迦上旋悖曪二合底飮幡曩迦比嚩孟幡怛曪二合繫滿馱嚩滿馱衣嚩無撥反娑怛羅二合林嚩曩塗鉢羅二合隸跛𮈖嚩曪怛覽二合滌鉢曪二合乞灑二合理多養跛哩播引攞多鉢曪二合步多種嚩引尾春嚩散多植嚩嚩無博反澤縛羅多馱皤引曪排頗羅分皤引誐崩鉢底多役婆曪季嚩無撥反曪灑絹鉢吒重布畔誐升鉢囉二合娑他二合憑鉢羅二合底也二合也折畔誐重絲鉢吒素怛覽帶嚩怛嚩二合曩宜鉢體也二合回跛哩襪無撥反多報鉢曪二合底庾二合跛迦引羅恩鉢羅二合娑引娜水幡儞引演幡跛哆引迦慧鉢羅二合惹拏二合熒鉢曪二合婆像鉢羅二合底摩引幸鉢羅二合引羅他二合盛婆曪拏修鉢曪二合訖曪二合麼鉢鉢曪二合怛羅二合衣支嚩曪又樣如上裳鉢賀也二合拏袋鉢曪二合細嚩蟲鉢羅二合引拏迦舒鉢羅二合娑引曪氍襪拏芳鉢曪二合尼合多𥶕鉢曪二合拏引攞蕭嚩儞也二合願鉢羅二合尼尼曳反馱引曩他跛曪潤鉢羅二合娑吠二合娜語婆引灑詳鉢羅二合底也二合吠乞儷二合可襪多重帝向鉢曪二合底半曩形鉢曪二合底尾借反麼栽嚩引尾既婆嚩底轉跛哩襪多居嚩引娑晧嚩虎娜迦捨嚩落鉢多底言嚩左南明鉢曪二合迦引捨者嚩多重事嚩娑覩二合髮嚩引攞臂嚩虎相跛曪娑波二合曪疥播麼節鉢嚩助播引曪濕嚩二合背跛哩二合瑟姹二合脅播曪濕嚩二合邊播引羅濕嚩塞婆上里多膿播引迦緣鉢曪二合底也足播娜痺鉢曪二合蘇蘇色反比迦流嚩賀底請鉢曪他曩語已上出義淨千字文頭摩薩頗助鉢𡃤室嚩背鉢力瑟姹髁骨縛入娑底般摩引唬看鉢捨也異鉢叨他上迦舒鉢曪捨哩也正鉢曪瑟姹圓鉢哩曼拏攞又圓嚩㗚覩攞殺鉢曪拏底色嚩無可反曪拏緑播引攞引舍觀嚩路迦耶繫跛曪訶稱響鉢曪底輸上多迦薩嚩羅言襪折娜語嚩無可反拏應鉢曪底俞多論嚩伐曩煮跛者抳施設鉢曪駟曩比也帝縛滿馱又嚩訶護跛攞養跛哩縛攞熟鉢訖嚩刀麼攞坐妹無智反舍又儞沙體也合十指波裨哩得鉢曪鉢哆問鉢哩二合車茗落跛底多如跛他去又也儞西跛室制麼外嚩哂𡃤馱步跛娜送鉢禮沙也迎鉢曪底俞捺誐麼曩識波哩惹儞悲跛哩泥嚩得鉢曪鉢底愛鉢也須鉢曪二合庾引惹那引聰明波尼多畏波野又嚩地也罪播半乞背厭數迦強嚩攞限鉢嚩二合麼引拏他人波引曪麼努史也二合最初鉢曪他門五半者十五半者捺舍五十波娜嚩二合舍方跛麼儞又鉢曪陛娜多縛戶儞雨波攞斤鉢羅二合薩他絹鉢吒物嚩薩覩二合又事也布網誐綾鉢吒二合誐錦指怛曪二合絲鉢吒蘇覩衣嚩娑怛曪二合金剛嚩日羅二合錢波拏𮡬薄羯多飮播曩迦兄弟波曪二合多姊妹嚩㘈儞夫波多引曪婦波哩野二合眷屬跛儞嚩曪商嚩抳惹衆會鉢噸沙地臣跛怛哩消息嚩㗚多主波底句跛娜出家波吠引儞野奉事鉢羅麼曩迦哩也婉嚩引羅老嚩拏又惹羅年嚩㗚史二合十二月頗攞遇抳夏五六月嚩㗚沙羅引怛羅二合後分鉢室旨未他麼水波引抳後日波羅戍以流水縛拏抳播且鉢曪二合捺哩二合沙林嚩泥道鉢娜他二合又未喇誐地鉢哩二合體尾又訖史底又步入弭雨嚩羅底又嚩訖沙底露波嚕二合沙拏二合光膝曪婆光明嚩婆娑渠鉢曪拏攞清水鉢曪三去曩波引抳沙嚩嚕迦灰波薩麼葉鉢怛曪二合皮縛羅迦二合攞山播曪嚩二合多又擬里土半素鳥博乞史二合抳翅博乞史二合羝羊嚩迦攞畜生波戍又嘻哩也二合遇庚儞羝羊曪他二合誐攞熊嚩曪賀草馬嚩拏尾鷹播引野細邊地鉢曪二合底也二合波斯國波引曰曪惹鴿播引羅縛多出鉢羅二合引拏黃桐波吒攞柏鉢那麼二合迦蓮鉢納麼蔥波攞拏大黃鉢納麼二合者哩昌蒲嚩者排頗曩槊播捨羅索播引捨器婆去引惹盤頗係攞鉢鉢怛曪酸棗縛娜曪梁嚩娜舍二合蓋波怛曪腰帶跋捺曪袋鉢曪世嚩藥毗殺社頸縛㗚拏履波怒脫破去拏器波喏曩盛縛哩多又婆曪拏廳跛舍攞厨波迦底二合捨哩廁縛打矩理旞歷波曪二合麼拂嚩引曪弭也二合制曩纒波哩尾瑟吒二合申鉢曪二合娑引㘈倒波底多破婆誐濯鉢曪紇沙闍吏浮波臘二合縛鑽波贊滌鉢曪揭沙抳也左嚩引麼溺跛抳賀曪輕毀波哩步多戲波哩賀娑也二合已出禮言梵語雜名般涅槃五地風西水銀壚盡像蓮花道路畏相念左與願衣角現食右足葉土小好偏椽牛鷹鳥閉腳胸五姊妹多妻妾臣學問語拜恐脣識孫客禮信走院罪願恨餓鬼鮮梵行濯洗風又節池街市他軍他盛他婦過世脅背薄血熟藏報答對論請問己説品那羅延子獄率飯食飮珊瑚頗梨已上出全真千字文圓西輔竪甥鄰朋咸得萬古店禍響應道推石渠讓驗提落弗暢雅要微懼指辭首盂盤衣塗羽鳥滌養林簿崇春種耕升帶折報思鉢舒𭯩詳形演載登入道身發春珠衆者外我底歡喜發光肱縛繫已上全真唐梵文字波頭摩佛亦云鉢頭摩此云赤蓮花婆羅王佛此云力波梨佛此云有力婆頭勿多羅佛此云蓮花度婆耆羅陀佛此云功德乘已上五佛號婆伽婆此云