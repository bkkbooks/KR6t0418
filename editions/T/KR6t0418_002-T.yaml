多羅𤘽盧書須彌北烏老波書擧烏差波跋多書奉轉已上四者八十四書之内優曇波羅隋云求願優波伽摩隋云來事優波斯那隋云最上征時欝陀伽論云盛也大論九十六已上出信行梵語集烏杖那國此云蒙苦輪王之苑囿也古云烏場又云烏荼皆訛烏逋沙隋云潔齋象色也烏脯沙他隋云經長謂受持法齋増垂善誓嗢達迦是獺戲義古云欝頭藍子依得非想定也優婆崛多阿羅漢此云近護胸汚惹肚汚娜引羅腸烏娜囉腿䏶烏嚧曲烏日樗高烏遮暖烏瑟拏二合勢嗢訶可起烏怛他二合北烏多羅立烏設羅二合制波烏怛麼二合上烏波羅又嗢路刺駄嚩恩烏跛迦師烏波引儞也孝嗚播迦羅水烏娜迦園烏儞也二合引曩獺烏捺羅駱駝烏瑟吒羅烏長國烏儞也曩狗把烏背娜麼迦仰者烏怛引曩已上出禮言雜名水北煖肚頂髻髮竪飯滅門流放廣供養揩齒木無上近士男近士女熱高馳開取擎脣布起上勝親教師癩狂鬼女癩鬼苑齊胸心上脣上已上全眞記烏波娜大日疏一云鄔波那亦云發起井韋陀可云鞞陀亦云比陀亦云毘陀亦云波陀此云智是外道法部大論第三韋欣婆此云中瞋是罪部韋陀輸應云憂陀捨譯曰大望是雜人部韋紐天亦云毘紐論云遍悶是神部已上出翻梵語集韋提希又云毘提夫人此云思惟夫人乃於脣汚瑟吒二合肱汚嚕引已上義淨千字文抑叉尼呪可云伊叉尼此云見也是經法部洹那鳩樓可云婆那鳩樓婆那者林鳩樓者是雜法部烏婆陀波尼律云薄甘遮糖飮食部烏陀那貴此云烏陀那者飯也飮食部越闍可云跋闍羅論云金剛是寶部久童倶麼引囉嘉倶捨攞重虞嚕謹虞魚嬌反羅嚩誰句敦虞嚕室羅駄善倶捨攞積倶引吒藏虞拏惹欽虞嚕嚢拽惹引遵虞魚嬌反囉嚩徳虞拏善倶舍拏成句吒祕虞呬也二合鶴句路二合惹洩二合糖虞拏恭虞魚嬌反囉嚩角句拏倉倶瑟恥二合迦瓮君上婆上斧矩𡛥引哩引麥娯度麼城句吒重薜倶底也二合雞矩但吒府倶嚩惹二合屎虞愚他腂虞攞頗已上義淨千字文敬虞嚕徳虞曩積句吒千萬句胝功徳虞曩小麥遇度摩大豆矩攞他斛句賀童矩麼羅童女矩麼哩族矩羅狗倶倶羅平安倶舍羅又善也龜茲倶支曩龜倶羅麼二合峯矩吒枷矩娜拏鷄矩倶二合吒鷹𪋞倶嚕闥止蔓菁遇遇魯重沙糖遇怒斧矩荼羅重輪捃覩又斫訖羅瓶矩邏攞瓫矩盤倉句瑟恥澡罐矩抵又羯羅迦藏句捨又比吒迦𮂸矩羅都窟彦引婆已上禮言梵語雜名倶那含牟尼倶留孫欝金安息香青木香毒藥牛黄瓮北契部屋花井瓮盆肚苽雞貴官善𢣺徳幢屎已上全眞記倶胝天女周云瞋因不空羂索軌下句律陀樹其菓名多勒婆羅門食之得仙道凡夫食之向須陀洹等觀佛三昧經一出之瞿曇可云瞿多摩亦云瞿沙門瞿者天多摩者樂𤘽那牟尼亦云𤘽那舍牟尼𤘽那者樹牟尼者儒𤘽樓孫此云威累𤘽修摩此云花已上四佛部劬羅呪可云波羅此云彼岸屈陀迦經此云微小屈陀迦阿含此云小婦已上三經法𤘽薩國像王經此云巧也是佛經部𤘽絺此云勝也中阿含第六鳩摩羅此云童瞿曇左𤘽樓陀支提此云動作折功徳宆伽色可云宆求此云吉也𤘽舍此云藏也倶呵吒可云倶𭇎羅此云浦也信行云補也瞿多可云瞿多羅此云星名𤘽盧奢此云喚仇留此云重日瞿摩耶此云中馬此云微細求尼求那此云有功徳屈陀迦此云微細𤘽樓檀可云𤘽樓檀那𤘽樓名作檀那者施求阿屡車此云嚴石室已上十三雜法部求那此云依也瞿曇此云姓也已上二外道法部𤘽留孫提菩薩此云領持𤘽樓菩薩此云姓也倶那摩提可云求那摩底此云功徳意群那師利此云功徳吉已上四菩薩部鳩摩羅伽地此云童眞是菩薩地位倶迦羅此云何時劬提迦此云功語究摩羅者婆此云童命瞿弘離比丘此云牛守瞿波離此云守牛瞿尼蒒此云覓思𤘽隷此種姓𤘽舍彌比丘此國名𤘽摩羅迦葉此云章也屈闍此云體𤘽多子帝須此云城光瞿沙此云聲名瞿醯迦此云住石窟瞿沙跋摩瞿沙者聲跋摩者鎧𤘽苫鞞此國名求那毘此云功徳勇掘多此云護已上十六比丘部瞿曇彌瞿曇者姓彌者女瞿卑此云牛女𤘽那羅此鳥名窮鼻此云極端正君荼羅繁頭可云君荼羅翅舍此云君荼羅者惓上五比丘尼部𤘽羅羅吒𤘽羅者種姓剌吒者國雜觀行部𤘽律陀聚此云瞋𤘽盧陀此云下瞋上二罪障部穹伽色舊譯曰應云穹求翻爲黄色持律者云五大色謂青黄赤白黒聲論者云穹伽是外國音也是此間語正外國音應云比多跋那比多是翻黄跋那翻爲色𤘽賒草衣舊譯云細茅持律者云莎衣聲論者云正外國音應云鉤奢底履那鉤奢翻爲茅底履那翻爲草謂茅草衣也𤘽盧舍持律者云五百弓長中人四肘已上三衣部𤘽舍波提王此云藏説𤘽屡陀此云瞋名瞿薩離王此云巧𤘽利刹帝𤘽刹者姓也刹帝利者田主𤘽沙羅王此云巧色瞿頻陀瞿者牛頻陀者知也瞿貧陀王可云瞿頻陀此云天得亦云説知𤘽臈婆此云不好聲𤘽羅婆此姓𤘽那國王此云不明了句留阿迦那句留者不厚阿迦那者不破求求譚耶致國王此云姓行已上十二王太子部究羅檀頭究羅者姓檀頭者云計亦云治也瞿曇摩此云姓瞿頻陀羅婆羅門此云生智上三婆羅門部倶迦那此云天樹名瞿曇阿夷哆此云姓不勝也瞿舍盧此云藏名也上三外道部駒尸仙此云姓也是仙人部𤘽睒毘長者子此云有藏瞿師羅此云聲彌沙塞律三瞿波羅瞿者牛波羅者字𤘽舍密多羅此云茅友上四長者部瞿毘耶瞿者牛也毘耶者女兒也大論二十三𤘽陀羅女此云好腹涅槃經一𤘽刹女此云織舊梨女尼此云童女瞿曇夷此云姓女休捨優婆夷可云𤘽捨此云茅也瞿毘迦釋女此云地至上七女人部𤘽牟頭譯云白花𤘽毘耶譯云智解安云聰明𤘽絺羅譯云勝私云膝歟𤘽牢婆應云𤘽末欺譯云惡友劬嬪應云劬嬪陀譯云𤘽者牛亦云天亦云地嬪陀者智也𤘽婆羅譯云惡力亦云不勝𤘽羅婆此樹名瞿披應云瞿波利譯云瞿者牛亦云地波利者守瞿羅譯云日也倶舍頻頭譯云倶舍者藏頻頭者諦瞿頭羅譯云地持𤘽私夜應云憍尸迦譯云天王𤘽鞞羅此云惡體鳩那羅此云惡人瞿曇摩此云姓鳩吒檀耽應云鳩吒檀多鳩吒者曲也檀多者齒鳩羅檀陀譯云鳩羅者親亦是姓檀陀者罰亦云班也瞿和離亦云瞿波離亦云𤘽和離譯云瞿者牛也波離者守也𤘽夷那竭摩羅應云𤘽尸那伽羅末羅譯云𤘽尸者茅那伽羅者城末羅者力瞿密應云瞿密多羅譯云天瞿陀梨舍哆譯云瞿者天亦云牛陀梨含哆者見也鳩摩迦葉應云鳩摩羅迦葉鳩摩羅者童迦葉者姓求曇此云姓倶那羅此云不好人𤘽羅祇傳曰親生上二十五雜人部倶蹉姓應云屈差此云下賤句留此云作亦云姓上二雜姓部𤘽毘羅此云非好身𤘽那羅此云鳥名𤘽鉤羅此云曲軍陀遮此云白花草鳩羅鳩羅檀提鳩羅鳩羅者親亦云姓檀提者罰上五神部鳩槃荼亦云𤘽辨此云冬苽𤘽魔和羅應云𤘽摩羅婆羅此云童子力上二鬼部瞿波梨龍此云天護亦云地護瞿伽蒐亦云瞿伽蒐此云地厚瞿曇冥可云瞿曇彌此云姓上三龍王部鳩陀延可云鳩陀耶此云鳩者好亦云地陀那者此云起𤘽牟陀此云地起上二像部𤘽眞羅可云𤘽枳羅此云好聲瞿枳羅鳥瞿者牛亦云地枳羅者釘鳩那羅鳥此云好眼瞿跋吒鳥此云隋牛鳩羅歩此云水鳥究究羅此云雞上六鳥部瞿陀此云陵鯉𤘽樓荼此云眼舊利尼此云食木上三虫部休休此云因聲爲名瞿波離比丘大泥梨可云瞿波羅比丘泥梨瞿者牛亦云地波羅者護上二地獄部𤘽陀尼亦云𤘽伽尼亦云瞿耶尼劬者牛亦云地陀尼者市易是西州也倶夷那竭國可云倶尸那伽羅亦云𤘽尸那渇雜阿含云草城倶尸者此云小茅那伽羅者城𤘽陳那耶國𤘽陳者姓那者律𤘽舍跋提𤘽舍者小茅跋提者有也𤘽留沙國此云穢濁亦云作事𤘽樓𤸑亦云居樓此云姓亦云作𤘽苫毘國此云城也𤘽睒彌國可云𤘽睒毘亦云𤘽舍彌此云木甚靜也亦云藏有𤘽舍羅此云善𤘽舍和提可云𤘽舍婆提𤘽舍者藏婆提者論𤘽羅婆此云作亦云姓𤘽舍婆此云有小弟倶留波可云瞿留波瞿瞿曇彌那𤘽驢可云瞿曇彌𤘽陀瞿曇彌者姓那𤘽陀者壽命𤘽尸國此云茅上十五國界部𤘽利城此云織亦曰樹𤘽摩波梨傳曰即當城瞿那竭傳曰常有城𤘽睒鞞亦云𤘽深𤘽睒者藏也鞞者有也屈頭摩城此云小樹𤘽尸那竭大城可云𤘽尸那伽羅此云茅城鳩樓城此云作亦云姓倶羅波單傳曰花城上八城部𤘽秀那羅村應云𤘽尸那伽羅此云茅城是村部倶利薗精舍此云織瞿曇廟此云薗姓上二寺部𤘽迦羅此云何持是處部求呵此云穴山也𤘽留歡喜此云作亦云姓上二山部瞿私多園此云白牛劬師羅園劬者牛師羅者可倶毘羅園可云倶毘陀羅此云破惡𤘽薩羅亦曰𤘽薩此云功上四薗部究仲婆此云惡火𤘽尸那池此云茅江上二江部𤘽絺羅池此云勝私云膝歟是池部𤘽羅衞渚此云𫶂是洲部倶尸那末羅王林倶尸那者茅末羅者姓是村部瞿羅樹此云團圓是樹部鳩尸草此云細草𤘽尸草此云長茅上二草部倶哆屑此云木求求羅香此云安息上二香部𤘽物陀亦云物牛頭𤘽者地物陀者喜𤘽比羅樹花此云破地𤘽毘遮羅花可云𤘽毘陀羅此云地動𤘽藪摩花此云花劬多羅利花此云衆姓𤘽毘羅華此云破地𤘽盧舍蓮花𤘽盧舍者五百弓𤘽蘭荼花此云經花瞿羅尼花此云白花上九花部瞿荼伽衣此國名也𤘽攝衣此云肅也鳩舍羅綿此云巧也倶脂羅劍倶脂羅者國名倶耽波劍倶耽婆者國名𤘽彌婆衣此國名也𤘽賒草衣此云細茅上七衣服部𤘽施可云𤘽舍此云茅𤘽留米飯此云作瞿羅律云美麨倶舍梨餅此云薄摩餅軍荼密軍荼者花名鳩樓摩可云鳩樓摩沙此云大豆上六飮食部𤘽利那衍踰句可云𤘽致那由他由旬𤘽致者億那由他者十萬由旬者四十里是數部已上翻梵語集捃雅迦即澡瓶也古云軍持訛略也鳩摩羅天秦云童子大論二瞿曇左𤘽樓陀支提應云瞿曇𤘽樓折埵譯云瞿曇者姓𤘽樓者作折埵者功徳聚鳩吒伽羅波羅譯云頂殿亭瞿毘迦釋女譯云地至也阿毘曇毘婆娑十七瞿嚧折娜牛黄瞿曇夷經云月女譯云姓女太子五夢經句潭又瞿曇彌梵云輕重倶譚徒南反滑提諸佛名𤘽邏窶沙此云音也倶拏鉢羅婆此云徳光經名也屈屈吒幡陀心此云雞足山求那譯云依也涅槃經十二窶盧盧幡陀山此云尊足君荼魏云大爐瞿曇般若流支此云智希瞿叉瞿摩又云瞿摩那此云半𤘽吒齒此云高嵈齒亦云積藉心𤘽摩羅羅多此云童受𤘽蘇摩補羅此云香花宮城瞿摩夷即牛糞之木智梵天寄牛以化天下天下所貴故興師説也句矌羅山此云臭氣香倶吒是山谷也瞿室𩜁伽山此云牛角窮鼻尼晋云極端正屈霜儞迦國此云何國鳩摩羅佛提此云童覺鳩摩羅斤波此云童壽求那跋摩再云功徳鎧求那跋陀羅此云功徳賢求那毘地此云安進倶夜羅器官毘羅隋云蛟龍倶絺羅長爪梵志也舍利子舅也已上信行梵語集也往夜底丁以反如也他引若也儞寧以反猶也他引咸也知枳二合止既也儞寧以反乘也引曩騁也捨已上義淨千字文夜吒此云往中阿含三十八夜婆陀揵尼可云剡摩陀耆膩剡摩地者伴耆膩者炎耶婆提伽此云持火耶酬毘陀此云施功徳事已上四外道法夜他路跋此云定實耶摩迦此云雙耶舍蘇蔓那耶舍者名聞蘇蔓那者好意耶沙陀利此云大名聞已上四雜法部耶舍菩薩此云名聞耶舍迦毘訶利此云名聞籌等耶舍陀迦蘭提此云名聞與耶須𤘽迦耶輸者名聞𤘽迦羅何時耶斯那此云名聞軍耶須婆那此云名聞林夜那此云乘也已上六比丘部耶輸陀羅亦云耶輸者名聞陀門者持是比丘尼耶若達婆羅門耶若達者與也耶耶帝王此云數行耶般那王此云邊地上國名已上二王部耶舍耶輸陀此云名聞與耶舍欝多羅此云名聞勝門已上二優婆塞耶舍長者子大論四十九亦云夜輸此云耶舍者名聞是長者部耶輸多樓耶輸者名聞多樓者樹也是二居士部耶輸此云名聞居士部耶若達應云耶若達多亦云延若達多譯云耶若者功徳達多者與夜披應云夜波譯曰可也耶輸伽譯曰耶輸者名須伽夜耶經曰名聞夜摩耶譯云縛也耶舍耶此云名聞樂五教反已上五雜人夜叉亦云閲叉此云能噉夜叉尼此云夜叉者如上尼者女已上二鬼神部耶般那此云縛也夜般那國此云邊已上二國界部耶扶嚢傳曰錢直城也已上城部已上出翻梵語集夜婆陀揵尼應云剡摩陀耆膩譯云剡摩陀者持耆膩者火耶婆提伽應云耶磨陀耆尼夜他跋論云實也譯云定實耶羅羅其義剃髮染衣當於生死疾得解脱耶輸陀羅又云耶戍達羅此云持與耶舍崛多此云稱藏耶寐匕毘反尼書隋云大秦國書耶那尼迦書隋云馱乘夜叉書無隋語耶婆陀輸多羅書増十句已上耶輸陀隋云無垢耶摩其尼隋云雙火耶舍此云譽謂名譽也已上出信行梵語集夜叉是云祕密舊翻或云密跡出大疏一名聞耶舍策野曩亦乘也往夜底大麥耶嚩乘夜曩夜叉藥乞叉已上出禮言雜名萬貴麼曷伽上州麼訶曩誐囉母摩哆引敞曼努囉引美麼哩二合瑟吒二合含麼哩也二合娜引弗摩鉢囉二合麼曬上馱匪麼勿麼迦羅引大麼訶魚末寫重餅曼拏患滿娜憦麼體他以反鞭麼娑怛囉二合迦徴末引誐也量摩引嚩鹿麼哩二合誐式麼哩也二合引娜慈毎怛唎二合引緩滿娜母麼引覩依摩引室哩二合底也二合肉麼引上誐髓滿惹引重胵曼拏羅人摩拏灑莫麼鬘麼引嚕江摩訶曩儞也二合已上出義淨千字文腹行神中起雌黄豆登魚肉根日中宰相殺意母墨我賤蜜索道路餅禮醉人腹行神女吉神想色主行殺者酒飮火珠寶珠已上出全眞千字文貴母妙含勿臣神蜜喜患絹名鞭吉求河道軌莫處眞言有麼上引攞垢已上全眞唐梵文字人麼努史也二合又娜囉肉麼娑隨未熱睰胸未喇麼又惹嚕鬢摩輸去引體摩耶畔麼拏甜麼度羅縛滿駄又嚩訶中麽𠆙也愧未毘也曩憍未陀婬梅土曩慢求麼誐我麼麼密麼度我許麼銘囉八千麼瑟吒娑訶薩囉八十千摩瑟吒娑訶薩囉貴麼賀摩上誐豆麼史引婦女麼呬理母莽多引貴摩訶喇伽大王摩賀羅引惹最大摩賀大臣麼底也舍人滿怛㘈二合月莽引娑又戰捺羅九月麼囉誐始羅午時麼馳也二合賀拏二合中夜末地也囉怛哩水牛麼𠰘沙中國麼駄也泥舍猴麼迦囉魚麼娑蝦蟇曼搦尺曲反迦孔雀摩庾囉蜂麼乞史二合迦蠅麼乞史二合藕麼哩拏引攞甘草麼度野瑟置二合胡桝摩哩啫椻曼乳沙鬘麼引攞舅麼覩攞外祖母麼多麼呬已上出禮言語雜名出阿彌陀經梵本大論十三云膝骨麁大名物綺羅秦云大膝我大漫珠室利妙吉祥孔雀人意意妙我人不思議已上小阿彌陀經梵本摩麼天女周言我所不空羂索軌下曼怛攞舊譯云呪非正翻也即直語如語不妄不異之音云云摩奴闍大日疏一云摩怒闍智度翻爲人即是人執也具譯當云人生此是自在天外道部類計人即從人生故以爲名唐三藏云意生非也末那者是意今云末奴聲轉義別誤耳文摩納婆又云正翻應云勝我言我於身心中最爲殊勝唐三藏翻爲儒童非也文摩拏婆又云儒童梵云摩拏婆此云納義利誤耳文莽鉢羅又云莽鉢羅是無義又是他義文曼馱多此云我養則頂生王之名也出一切經音義玄應第二十四摩尼幢佛摩尼者珠也摩訶衍可云摩訶耶那此云摩訶者大耶那者乘摩訶惟授如來經云大嚴已上佛號部摩訶般若波羅蜜經此云大慧度彼岸魔修多羅此云不法生也摩那闍藍律云化經摩訶娑摩耆劍律云會經摩訶尼陀波梨耶夜律云大因縁經摩訶僧祇此云大衆摩羅偈此云行摩訶尼陀那經此云大因縁也摩㔁女經此云下姓摩訶鏂波提舍此云大説已上十經法曼佉書此云草印是外道法摩訶此云大亦云勝亦云多論智三摩磨迦羅摩磨者我迦羅者所末嗟羅可云嗟利論曰慳摩多羅迦此云我度摩怛羅迦應云摩致利迦此云母本摩摩帝陀羅摩摩帝者主陀羅者是持摩得勒伽此云母本八證第七摩那伽此云慢行曼提吒色此云莊嚴藩荼羅此云圓摩醯陀羅此云大天主四分律摩訶羅此云大王四分律曼陀此云最勝四分律八摩娑迦此云月摩羅此云華末羅此云偸信行云兪摩訶卑陀羅應云摩呵鞞化那此云大受摩夷此云有他摩那此云意摩尼跋羅天祀此云珠賢摩毘陀此云莫智摩沙陀那此云小施摩波利此云木護摩頭羅來此國名也摩訶衍三拔到摩訶衍者大乘三鉢致者具足摩訶波羅會此云大護已上二十五雜法部摩訶薩可云摩訶薩埵摩訶者大薩埵者勇猛亦云精進亦衆生摩訶須菩和此云大好道摩那提菩薩此云慢斷已上三菩薩摩訶倶絺羅亦云𤘽絺羅摩訶者大倶絺羅者膝摩醯那此云大天主末闍提此云莫瞋末未摩可云末荼磨此云中道未多婆耶此云縱逸時摩呵須摩此云大月摩多羅此云少許摩呵波頭摩娑此云大蓮花摩勒迦子可云摩勒已此云賣花鬘摩那合陀摩耶者意答陀者飽摩訶般他迦此云大路鏝慈毘梨此云緩精進摩呵闍迦檀可云麼訶檀那此云大施摩訶夜移此云大行摩頭羅瑟質可云酉商此云密勝摩訶劫賓此云大分別時摩樓子此云父名摩離亦云未離羅此云力也摩訶律頭可云摩呵律陀此云大威徳摩師比丘此云大吉摩呵陂那陀惟劍此云大聲與摩訶迦葉迦葉者姓摩訶目迦連亦云摩訶目揵連此云大姓摩揵提此云求道摩訶男此云大名摩陀羅此云大持摩頭波斯咤摩頭者密波斯吒者殘亦勝摩鍮羅道人此云甜末佉梨此姓摩訶提娑此云大天摩訶迦此云大身摩呵迹那此云大瞋摩夷此云化摩帝此云寺主摩訶迦羅此云大黒摩訶盧亦云摩訶羅此云老亦云無智摩伽此星名也摩伽梨倶此云道覓摩醯沙達多此云與大自在滿茶此云遲摩訶那此云大聲摩訶那彌此云大名摩訶𤘽私此云大弟摩頭婆肆吒此云密最勝也摩訶劫賓寧王此云大分別時是王太子部出之摩訶金毘羅此云大是孔非孔摩訶梵提此云大淨天摩訶桓迦隣大比丘摩羅鳩摩羅此云花鬘童摩訶揵陀衞羅此云大香雙摩醯舍婆此云大聞已上四十七比丘名也摩偸婆尸陀摩偸者騫婆尸他者殘摩陀利可云摩多利此云脚垂未那婆可云摩那婆此云年少淨行摩羅娑此云草嬾摩羅毘比丘尼此云國名摩訶波闍波提比丘尼此云大母主摩訶卑耶惒題倶曇彌此云大世主姓也摩訶波惒提比丘尼此云大勝語已上八比丘尼摩佉此星名是一沙彌也摩伽沙彌舊譯云道聲論者云正外國音應云摩勒伽翻爲道亦路摩訶那伽摩訶者大那伽者龍亦云𠌵摩那斯伽羅此云思惟已上二聲聞行曼提吒它持律者云五大色聲論者云正外國音應云曼提都私反哆跋那曼提哆翻爲好跋那爲它摩那埵舊譯曰齊量持律者云折伏下意亦云治僧殘罪聲論者云正外國音應云摩捺埵摩捺翻爲慢埵翻爲除謂除慢安等折伏下意除慢法治僧殘罪是説對治名非正翻摩檀提娑羅門可云摩檀陀此云天與摩訶那摩此云大名摩訶迦婁那此云大悲已上三婆羅門摩偸羅王此云美也摩因陀羅西那此云天主軍摩哂陀王此云天主摩訶羅此云大王摩呵羅檀曩王此云大實摩訶留那寧王子此云大滿向摩呵令奴王此云大寶摩訶提婆王子此云大天摩訶波羅婆修王此云大護寶摩闍婆王子可云末闍梨此云和軟摩羅太子此云華摩醯斯那此云大軍摩呵劫賓寧主此云無分別時慢化多王此云我待摩訶三摩可云摩訶三摩多此云大正歸曼陀王此云最勝摩賢王子此云他也已上十二王太子部摩呵先此云大車摩訶斯羅闍鉢提此云大世主摩耶此云化已上三優婆夷摩祁羅舍此云摩祁者體邏婆者味摩沙此云分亦云豆是仙人也摩息迦利瞿舍利子摩息迦利者國名瞿舍利者生饒未伽梨𤘽舍離子末伽梨者姓𤘽舍離者廐摩樓迦葉此云木也摩竭梵志此星名摩竭檀提梵志此云鹿罸摩因提梵志此云大天主摩耶利梵志此云有化摩訶迦此云大身已上八外道名摩竭大臣可云摩伽陀此星名阿毘曇毘婆娑四十七摩那提那摩那者慢亦云意提那者與也摩訶那摩他此云大名與菩薩藏經已上二長者也摩訶先那居士此云大軍阿毘曇毘婆娑三十六佛説大意經摩訶檀居士此云大施應云摩訶陀那已上二居士也摩耶夫人此云化花寶三十六摩利夫人亦云末利此云花寶第一摩呵摩耶夫人此云大華已上三夫人摩揵提此云不見道曼紙此云智摩羅女此云花鬘摩梨尼女人此云有花鬘摩㔁伽女此云下姓摩那祇此云慢何女摩訶先尼此云大軍女摩伽羅母此云不見道已上八女人部摩訶三磨陀譯曰大遍摩訶斯那達多譯曰與大軍摩呵納應云摩訶那摩亦云摩計男譯曰大名摩醯提利應云摩顯陀羅譯云天主摩納亦云摩那婆譯云年少淨刹漫提譯云懈怠摩提提譯曰不香摩訶那伽譯云摩訶者大那伽者龍亦云𠌵摩菟闍亦云摩菟奢亦云摩菟舍譯曰意摩訶利應云摩訶利歌譯曰母摩訶南釋應云摩訶那麼釋迦訶那磨者大名釋迦者能摩羅婆人譯云國名摩揵提譯曰求道摩訶羅此云差亦云無知摩竭陀應云摩伽陀亦云摩偈譯云國名也摩呵貴舍譯曰大等未羅譯曰力亦云姓摩呵般陀譯曰大路摩訶那羅陀迦葉摩訶者大那羅陀者人與摩那多陀譯曰摩那者意多陀者如是摩呵能伽譯曰大欲摩呵旃應云摩訶旃陀羅經云大月摩闍奴應云摩訶闍奴此云大人摩訶僧那但應云摩訶僧那僧但也此云大鎧莊飾摩羅童子此云花摩訶羅陀此云大冷摩訶伽羅奢此云大苦摩訶那摩陀那應云摩訶那摩多陀那摩訶那摩多者大歸敬陀那者施摩訶波羅劫此云大護摩訶離婆帝此云大星摩訶若那此云大智摩呵醍經曰大長摩呵敢應云摩呵敢摩此云大事莫揵應云莫揵陀此云覓道摩留人應云摩留多摩留此云山摩賢陀羅此云大天主已上三十一雜人部滿羅蘇摩應云末羅蘇摩末羅者力蘇摩者因是雜姓部摩彌此云莫我摩醯首羅論第三曰大自在摩尼乾陀此云珠香摩尼跋陀此云摩尼者珠跋陀者賢摩伽羅此云鯨魚漫陀神此云獺摩頭達陀神摩頭者蜜達陀者與摩頭達陀神應云摩私建陀此云密聚摩菟舍阿摩菟舍此云人非人摩訶迦吒摩訶者大迦吒者短摩竭婆羅應云摩伽羅婆羅摩伽羅者名婆羅者力也摩訶波那此云大飮已上十神名摩竭陀夜叉摩竭陀者國名亦云星名摩羅陀利夜叉此云花持摩尼鉢羅可云摩尼波羅摩尼者珠波羅者護摩頭此云美色已上三鬼神部摩睺羅伽亦云摩體勒此云大盲行是龍也摩那斯龍王此云大意摩尼揵大此云珠香已上三龍部摩呵那極可云摩訶那者陀羅此云大𠌵王滿呼經曰覺磨荼可云末多此云醉已上二𠌵部曼陀婆此云停舍是鳥部摩伽羅魚亦云摩竭此云鯨魚摩羅毒蛇摩羅者此云花鬘摩奢此云蛟已上二虫部摩呵波頭此似大黒蓮花摩訶波頭摩此云大亦蓮花摩訶鼻此云大無間摩訶盧獦地獄譯曰大動已上三地獄部摩鍮羅境界此云密亦云美摩鍮境界此云國名曼荼羅境界此云圓已上二世界也摩伽陀國亦云摩竭提亦云默偈陀摩伽者星名陀者處也摩瑜羅國此云孔雀摩離國此云力亦云妹摩兜囇此云勇末羅亦云滿羅此云力亦云姓摩偸羅國亦云摩頭羅此云密亦美也摩醯娑末陀羅門國可云摩醯賖曼荼羅此云摩醯賖者大自在曼陀羅者圓摩勒此云花摩伽提國此星名也摩醯波低摩醯者地波低者主摩羅婆耶此云摩羅者花婆耶者時摩提國此云好慢摩呵勒吒國可云摩呵頼吒此云大國已上十國界摩頭羅傳曰無酒城摩梨傳曰塗香城曼訶都吒傳曰大海口城摩訶舍城此云大樂五教反摩頭羅城此云呉已上五城部摩尼周羅聚落此云寶髻亦云珠髻摩頭羅聚落精舍此云密摩那摩傳曰𠌵死寺摩呵比等可云摩訶毘訶羅此云大寺已上三寺部摩梨山此云無垢摩師山此云黒摩羅耶山亦云摩羅延摩羅者垢耶者除漫陀山此云護亦云實摩羅山此云行次亦云花鬘摩𤘽羅此云喧閙摩倶羅山此云天冠摩頭鳩羅山此云摩頭者密鳩羅者種種摩伽山此星名摩花也漫耆尼亦云漫陀竪尼此云漫陀者花竪尼者有也摩尼優利傳曰珠已上十一山部摩醯此云歸亦云摩食是河也摩陀池亦云摩陀延此云醉池部慢陀洲可云曼陀此云最勝是洲部摩訶提婆菴羅林此云大天果摩呵槃可云摩呵般那亦云摩訶那摩呵者大般那者林是林部摩訶沙婆樹摩訶利者大稻婆者有也蔓陀羅律云練樹摩樓樹此云堅摩頭樹此云密上四村部摩樓迦子此云游摩樓多受草此國名已上二是草部末願乾提此云乾提者香是香也曼陀羅花此云圓花曼殊沙此云檻花摩利迦花此云次第末利花此云重摩頭揵提此云濡香亦云密香蔓那花此云意摩羅毘訶傳曰新花已上八花部摩陀羅菓此云醉可云摩陀那摩頭菓此云美已上二菓部摩訶楞伽此云摩訶者大楞伽者色摩呵僧那僧涅摩訶者大僧那者鎧僧涅者著已上二衣服部摩頭陀婆漿摩頭者密陀婆者酢摩訶毘梨密此云大精進摩沙曼陀此云小豆縵頭油此云第一縵闍密可云漫闍梨漫闍名花葉也摩訶毘梨密此云大力已上六飮食部摩羅伽陀論曰緑色此云青珠摩呵尼羅論云大青珠此云大黛珠摩尼婆陀夷摩尼者珠婆陀者賢摩娑羅伽𮀉此云馬瑙已上四寶珠部摩睺多經曰三十羅耶名一摩睺多是時節部已上出翻梵語集摩醯因陀羅此云帝大末加梨論譯云覓道是外道法磨迦羅應云磨磨歌羅論云我所譯云磨磨者我歌羅羅者所摩多羅迦應云末多羅迦譯云末者我多羅迦者度也亦云濟摩帝陀羅譯云摩摩者主帝帝陀羅者是云持七法淨第五末闍捨譯云軟聲未伽此云道莫訶婆伽麝香未捺眵羅雄黄曼尸羅茅根香似葦茅而香瞞羅仙人名也瞞莫安反摩瑜人名也瑜以朱反摩揄此云立也寺名摩醯矩羅王此云大族摩訶那摩此云大名也甘露飯王子也摩樓迦又云摩迦又摩嚕迦此云藤類蔓生繞樹至死也摩尼跋陀富那跋陀私云二人歟大鬼神王執幡蓋常隨佛也摩提此云心也摩菟娑此云那羅今云未奴沙此人摩訶鉢剌闍鉢底此云大勝生主曼陀羅花此云適意花曼殊沙花此云柔軟花摩訶三末多此云大等意也魔羅魏云鬘世人所奉九子魔是也曼陀羅此云弱聲亦云弘弱摩陀多隋云持我摩訶波闍波提隋云大慧亦云梵天亦云活生本已上摩那書斗未荼叉羅書中摩睺羅加書大地末荼婆哂尼書中流已上六十四書摩拏陀羅隋云意持摩耶隋云幻摩羅祁梨隋鬘山摩梨支隋云陽焔曼陀那塔隋云攅酪木塔摩低婆羅隋云極力摩梨尼隋云小鬘摩多梨言隋云無著摩訶娑他羅隋云大摩田摩呼荼迦隋云歡喜丸摩訶羅坐時不正也已上出信行梵語集漫怛攞是眞言古云呪非正翻也出大疏一未田底迦阿羅漢阿難弟子也西域三滿儒尸利菩薩大論七云秦言抄文暦二年歳次乙未五月八日書寫
