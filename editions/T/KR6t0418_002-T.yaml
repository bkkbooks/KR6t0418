body:
  text: 多羅葉記卷中迦第迦儞也二合娑引勃囉二合多事迦引里矝迦嚕拏喚郝迦引羅務迦羅理引也俗仡哩二合𠰘引市賀吒重箴𮓌賀上拏龜迦縒跛何迦多麼紙迦引迦里筆迦攞引麼兵迦怛嚩二合嚩囉躍郝乞灑二合劍竭誐慮迦娜引止覩壞建惹詐迦嚩吒床朅吒重木迦引瑟𡛥重牛誐縛匙迦攞引止鑊迦吒重賀𤬪伽上吒耕賀攞梨賀攞驢佉上囉課迦羅數誐赦多計誐拏曩引算誐抳多肘賀娑多裁劫跛家伽上羅劫迦攞跛悲迦嚕抳趣誐底軫曷娑多諾刹怛羅袈裟迦引灑引也瓶迦羅迦厚伽曩麝娑始利迦歌誐引以須迦引哩也二合業羯麼胎𮓌婆作迦引羅迦去誐多幾迦底傷伽底多哉迦瑟吒二合耳羯拏咽誐攞房伽上囉腰迦置胯迦知播引羅捨午賀沙多二合已上以唐梵文字梵字合點已上義淨千字喉掲拏入耳羯𡃤拏鼻竭羅引拏脇迦車上手賀薩多赤曷羅迦多手掌賀薩多怛羅厚伽曩短賀囉薩者𡄇迦去引婆黒迦攞又訖哩二合史拏二合咲賀娑也又賀𭇟多獨迦嚩㘕辛迦柱迦驅使掲喇麼迦囉引打賀曩放誐車底又弭哩癢迦拏姹二合迦務迦羅抳取凝叻紇𭍈去誐車又誐多逆誐訶捨嚕瞋迦史吒善迦哩也唯獨迦縛哩衍作羯𭋹曩所作事掲利尼也矜迦嚕抳也亦悲也分賀引誐數誐抳多肘賀薩多升迦縛制又鉢羅薩他重誐嚕奢賀囉綿迦指囉裁迦畢比多蘇伽哩二合多麺迦抳迦麺呵引吒俗人誐囉娑他二合筆迦囉忙半音村誐囉二合麻懷孕誐陛㗚尼宅誐囉八月迦㗚底二合迦刹那掲娑曩濁迦沙埿迦羅那二合麼草誐娑趣迦也六趣也特牛誐麼𤙷牛誐牛驢誐囉又誐娜嚩迦毘羅城加尾攞縛娑多迦閃弭迦閃弭囉迦吒富單那大刀竭誐迦婁羅麝迦薩吐二合羅麞賀哩拏犀佉仰上鵞賀捺娑二合鼈迦囉娑二合波蟹迦羅迦二引吒迦鵲迦囉引伊烏迦班引迦熒火迦儞曳二合多迦釜賀抳苦菜迦者麼引指瓮迦攞始訶梨勒械賀抳鑃迦抳怛攞二合鋸迦囉波怛囉二合𭮓迦去引拄囉匙迦攞引楯迦鐺迦囉𠰘舍伽囉椽迦哩孕舍閣迦訶靴迦縛史釧迦知上瓔珞訶藍耳璫迦囉拏二合縛㗚拏樓迦麼瓦迦波羅又云舍羅縛沸迦咤多詈誐引理幼羯知娑弟迦怛麼婆羅多升迦知比怛𭋹弟婦迦知婆羅二合爾已上禮言梵語雜名迦葉佛金翅鳥褐牛黄雌黄金毒藥蘇躑躅耳手又肘也髑髏喉鎚甲蘂芥子油門扇象身捉喫著何作食處女木宅窓瓦草瓦竈匙瓶馬驢又又馳東頬兵弟兄弟也筆短蘇悲喜覓善菜喚困床靴女金翅室市郊田舍兒打捨報喉把頬説語暦數盜行殺曲吏作已上全眞千字文聚詩幽歩進劍盧懷返木鑊執澤犁嬾天數計算肘劫悲振軫殿單麝須割悲環瓦草椓竈箸瓶兵兆十億爲兆弟兄弟也貴𥬇濁覓求覓也床靴已上出全眞唐梵文字迦奢羅佛此云光曜迦羅鳩孫陀佛亦云𤘽珊提此云領持迦葉佛此云姓也迦那伽牟尼佛迦那伽此云金牟尼此云儒已上佛號伽陀此直説迦羅摩經此云好迦葉毘部此云姓迦盧鏂提舍此云時説已上經法號迦毘羅論此云仙人名涅槃經第十九佉樓書此云如是阿毘曇毘婆沙第十一佉沙書此云邊也已上外道法名歌羅亦云歌羅亦云迦羅羅此云受胎七日不淨和合時伽那亦云楗陀亦云楗那論云三七日時如凝酪迦羅迦可云歌羅羅論云作者加陀可云伽荼此云深底論云底也亦云堅也信行云伽阿陀吐論云虚空迦哆摩求那論云是事邊得何利迦車提論云去伽那應云伽奈論云厚楗椎此云磬伽羅此云屋亦云𩒐信行云佉羅西國木也佉陀羅此云沈涅槃第十六伽伽應云伽伽大未此云空増一阿含二十一迦闍尸利波支操此云國名亦樹名伽羅耆婆利頭此云人命呵梨陀羅也此云雌黄伽那尉禪此云伽耶者厚子也尉禪者此國名呵吒牧羅此云破勇迦利沙槃可云訖利沙槃此云一兩訶羅此云取迦羅尼此云可作迦陵伽角牛此云細滑伽彌尼此云可往鞞婆沙第八迦利仙眞此云時迦耶梨此云姓迦呵那可云伽訶那此云受伽羅毘羅聲伽羅此云頸毘羅此云好迦墨可云歌摩分此云意樂五教反迦延此云一情入上三十雜法迦蘭此國名也迦羅呵達多此云受與此菩薩也伽帝浮彌此云道地是菩薩地部迦羅辟支佛迦羅此云黒辟支佛此云縁覺迦羅尸棄今云歌羅尸棄歌羅此云時尸棄此云大是支佛名也迦栴延尼子迦栴延此姓也尼者女也是比丘名迦摩此云愛欲訶多釋子訶多此云打亦云害亦云不勝釋子者能也伽耶迦葉此云因國名是比丘名迦特利此云甘准下文蕉迦羅此云黒亦云時迦蘭陀子此云善與柯體比丘古譯云婆體難提翻云多喜迦利比丘此云黒亦云時迦樓陀夷亦云留迦陀夷迦樓者時陀夷者起古譯云迦留者時陀夷者起聲論者云正外國音應云柯盧陀夷柯盧此云早亦黒陀夷此云生亦云起以日初出時生故名早生有優陀夷色白柯盧陀夷也黒故以起黒受稱云云迦扶陀此云鳥鳩迦陀此云已作迦求陀伽栴延此云領姓迦樓比丘此云作亦云性迦留羅提舍此云金翅鳥比丘也迦那富羅迦那者金富羅者滿伽那子比丘此云厚伽伽比丘此云姓伽羅須末那此云頸好意迦羅須末那迦羅此云黒餘如上迦留提舍此云時説迦毘此云久障迦毘羅此云蒼迦遮延此云姓迦爲拔抳此云國名上二十四比丘部迦羅伽此云日時行迦羅跋嗟迦羅者黒跋嗟者犢迦羅跋陀迦毘羅比丘尼此云黒賢蒼伽羅旃陀輸比丘尼此云頸月好迦絺那衣舊譯云功徳衣迦提月舊云時月持律者云功徳月亦云望衣月迦師阿覽摩耶此云明境界雜觀行部迦罪越亦云羅利此云有時是婆羅門也迦梨王此云黒迦帝迦王此云幾迦羅婆利王迦羅此云時亦云黒婆利又云有力迦陵伽此者國名是王也迦夷王此云有體迦隣王此國名也迦羅育王此云黒時迦叉王此云不好眼迦沙王此云明也迦良那伽梨太子此云善事迦摩沙彼陀王此云駮足迦藍浮王此云雜也伽提那王此國名迦羅王此云黒佉楞伽羅此云惡體是優婆塞也呵竭多仙今云阿伽多此云來竭伽仙人此云姓伽那那此云計數是仙人部佉盧吒仙人此云強鵅𩾹迦毘羅仙此云蒼也迦羅那此云仙人經是仙人名也迦羅鳩駄迦栴延迦羅鳩駄者領迦栴延者姓也佉提羅葉此云破空是外道也迦毘羅弟子今云迦比羅此云蒼也鑒婆周羅鑒婆者此云座周羅者頂髮也上三外道名也迦留長者此云作迦蘭陀長者此云好聲信行云迦蘭陀者是鳥名也似鴿鴙而尾長伽羅摩長者此云衆園迦梨輪居士此云増惡應云伽梨喜疲迦不多樹女此云極臭軻梨羅山今云軻地羅訶此云空地羅此云破伽伽羅此云膠者是山名也迦尸里山迦者光呵梨陀山此云黄伽耶山此國名也伽闍山此云像加陵加此云國名佉陀羅山此云栴迦羅毘𤘽此云姓聲是山名也佉羅底翅山此云青色迦羅摩此云姓迦羅無提迦羅者時無駄者喜迦蘭陀薗此云好聲伽隣竹薗此云鳥名伽耶薩羅應云伽耶娑伽耶者國名也娑羅者樹名也迦物伽河此云腫領掲伽池此姓也迦羅池此云時迦毘羅婆仙人林今云迦毘羅跋迦毘羅者蒼跋者住也訶梨勒林此云天主枝來珂梨羅今云珂羅此云空破竭摩羅可云揵陀摩此云香花是樹名迦毘陀樹此云梨迦尾迦樹可云尾割迦羅尾割在耳迦羅者作伽賓闍羅可云劫賓闍羅此云鳥鳩是樹名迦羅那樹此云竪迦曼婆花樹此云白花伽鳩樹可云迦鳩駄此云領迦隨羅術樹可云迦毘羅跋臭迦仙人跋臭者住處迦尸草此云細萩迦羅香此云黒花佉陀梨葉可云歌陀利此云甘蕉迦那迦花此云金也迦羅尼花此云黒迦迦羅花此云直迦尼蓮此云甘佉陀羅子可云伽陀利亦云甘蕉柯必陀菓此云梨迦羅迦此云黒迦陀迦菓此云作菓迦多離菓可云迦陀利此云甘蕉迦尸輕儒衣此云光迦陵伽衣國名伽陵伽波和羅伽陵伽者國名波和羅者衣伽頭鳩羅可云迦羅鳩羅此云黒細布迦盧醯尼藥今云歌盧醯尼此云黄蓮迦私藥此云光呿陀尼此云可噉迦遮鹽迦遮此云光是鹽也呵梨陀漿此云黄薑是飮食也迦鳩陀婆羅珠迦鳩陀此云領婆羅者勝也迦羅此云時伽陀此云十頻婆是數名頻婆者百萬也迦彌應云阿伽彌論云來也迦羅富應云迦多富譯曰臭也伽夷譯曰歌也伽羅譯曰頸歌羅摩納應云歌羅摩那婆譯云李少淨行亦云人也伽毘譯云有牛迦羅呵譯曰門淨劫毘羅譯云蒼伽盧帝舍伽盧者黒也底舍者光亦云火佉沙人譯云滔也迦乾陀應云迦羅乾陀譯曰迦羅者黒乾陀者香迦蘭陀譯曰國名迦毘利經曰黄頭譯者江名迦賓闍羅此云鳥鳩迦羅密應云迦羅密多羅此云時友迦羅越應云迦羅娑此云有時呵難提和應云阿難多提婆阿難多者無邊提婆者天也竭曇可云瞿曇此姓也迦毘羅應云加比羅譯云蒼亦姓也迦羅那此云作也伽𤘽羅應云歌𤘽羅毘樹名也高羅婆應云𤘽羅婆此云姓亦云作迦留陀提舍應云迦盧陀耶提舍譯云時起説上二十雜人部佉羅騫大阿修羅王此云佉羅騫大智惡陰佉羅騫陀應云佉羅私建陀譯曰強體上二神部伽羅夜叉伽羅者星夜叉此云服噉迦羅富單那應云迦吒單那亦云迦富單那此云作臭伽羅鬼此云天食軻羅此云強訶陀羅鬼此云嚴羯摩沙波羅鬼應云羯磨沙波陀此羯磨沙者點波陀者脚訶悉多應云訶悉多迦此云不自竭吒富旦那此云𭔰臭迦祭羅此云天眼迦羅邏此云除累呵利提那𭇎利者天主提那者可與呵利陀鬼子母𭇎利陀此云黄色信行云訶梨帝此云青色興皇云上十二鬼部伽毘羅可云鉗毘羅此云深也是龍名也迦毘羅龍王可云迦比羅也此云蒼也伽寧此云有伴是龍也迦羅此云時亦云黒迦迦龍王此云大黒伽毘羅濕波羅可云鉗毘羅濕波羅鉗毘羅者深濕波羅者巧是龍迦羅龍此云黒迦羅勒可云迦羅邏赤白共合伽尼羅此云像迦羅梨此云黒像迦䛏留亦云加泥羅此云小也上三像名也謁伽狩此云𡱝是獸部迦陵毘伽鳥可云歌羅頻伽云蘭伽迦陵者好毘迦七聲迦樓羅王此云金翅迦毘伽鳥可云迦毘伽羅此云迦毘云聲伽羅云好迦頻闍羅鳥此云鳥鳩迦蘭陀迦蘭此云好陀此云與迦迦可云假命此云雁訶梨那鳥此云青色上六鳥部迦羅求羅虫可云迦羅谷那迦羅者此云里谷那者此云木虫迦羅羅虫此云黒上二虫部呵羅邏論云寒戰聲是地獄部迦羅秀頭泥梨可云迦羅修多羅此云黒繩伽樓羅地獄此云重籠上三地獄部伽耶國此云鐵杖迦毘羅婆可云迦毘羅跛私亦云迦毘羅迦毘羅此云蒼跋私者此云住處迦比羅兜可云迦比羅跋兜迦比羅者此云蒼色跋兜此云住所伽赦國此云光也呵尼國此云等亦云破竭闍國此云像伽藍國此云封伽私國可云伽尸此云光伽夷國此云體伽郎伽羅國伽郎此云獺伽羅此云頸迦陵伽蘆此云伎述高羅波此云極作佉沙此云不正語伽細羅竭國可云迦比羅那迦羅此云蒼城伽毘羅國此仙人名迦羅奢不傳云滿雁餘國伽沙國此云正語伽鼻國此云有牛上十八國部迦陵伽婆提城迦陵伽此云鳥名婆提此云語迦羅越傳云入工城迦毘羅城此云蒼迦羅富城可云迦羅富羅迦羅者兒富羅者城也迦拏憂闍傳曰高肩城上四城部迦尸耆利大邑迦尸此云廣耆利此云山迦蘭陀邑此云好聲上二邑部佉蒐波提可云佉蒐婆提舍佉蒐此云偈婆提舍此云説迦蘭陀村律云山鼠此云鳥名迦梨摩沙村此云忍亦云黒上三村部訶梨伽藍傳曰聖村迦羅差摩迦羅此云時差摩此云人迦羅洹寺可云迦羅婆那此云黒林迦那加遲此云金是堂名迦耶祀舍此曰國名也迦利此云黒亦云作迦梨羅講堂此云濁迦梨講堂此云時亦云作上九寺舍部迦羅越家可云迦羅婆此云有時迦陵伽此示好聲亦云國名是處部已上出翻梵語集迦利沙隋云半兩訶利帝此云青色興云已上雜法部迦摩羅譯云水垢加闍尸梨沙支提應云加闍尸利沙支提譯曰加闍者國名支利沙者樹名支提者功徳聚也雜阿含第七伽羅耆婆禪頭應云波多利弗多羅譯曰伽羅者人耆婆者命禪頭七畜生雜阿含第十二迦藍摩亦云迦藍譯云姓已上五雜法之内迦蘭陀長者律云迦蘭陀者山鼠譯云鳥名也善見律六伽羅居士譯云頭迦螺人名朅地羅古云佉陀木名也迦脂婆王名也脂側飢反從人臂生如來頂生等巷提又云遷提謂可遷從撃也以巷草爲之出崐崙山也迦捍西國樹名迦簍菩薩名也呵膢八月祭名也佉詡叢林名迦箄此云藿香也迦樓陀夷此云黒土又云黒色也悉陀太子未出家師也迦留迦果轉爲鎭頭果賀羅馱又云遐利提此云池迦隣提又云迦陵迦陵此云可愛提此云與伽藍摩此云聚落迦梨摩梨迦梨此云時也摩利此云花羯拏伽羅羯拏此云甘伽羅此云頸佉羅即成大小便竭樹羅此云裝樹此形小故也羯若鞠闍國此云曲女城中印度境曷利沙伐彈那此云喜憎羯羅拏蘇伐剌那此云金耳也國名也曷羅闍代彈那此云王憎迦肆娑此云樊石此有青白色迦留波陀天此云像迹天迦陀伽此云時水褐剌縭衣織野獸毛細輭大可得𦂝續故以見埵而宛服用云云薑梁耶舍此云時稱訶夷摩迦隋云金者迦梨耶那隋云正眞佉盧虱吒書隋云驢唇珂沙書流勒迦迦婁多書烏音伽那那跋多書算轉伽伽那卑麗叉左書覩虚空迦毘羅婆蘇都隋云黄願居處迦荼隋云黒伽耶尸梨沙山隋云象頭柯倶婆隋云小峰佉吒傍伽隋云持田令珠揩之一并御迦蘭那富羅隋云甘城伽婆跋帝隋云牛王迦吒牟尼隋云苦行仙迦吒耶那隋云將受行迦𤘽婆隋云峰迦還隋云赤黄色迦毘羅隋云黄赤佉闍尼食五似食也一根二莖三菓四磨食大小麥五菓粥已上五十五出信行梵語集多星多引囉迦南諾乞史二合拏僕娜引娑貧娜哩捺囉二合引汝怛嚩夜引席多攞枲星以反三怛吒二合抳走駄引嚩旗駄嚩惹呈捺囉捨二合也銅擔引麼囉二合閣駄嚩攞佉上羅敵駄怛娜嚩雖娜娜引弭賞娜引也臛捺囉二合嚩酌捺尾鄔妬攞持駄囉齒難多安姹跛素上佉鎌娜引怛覽二合簿多弩施娜曩弓駄弩篩稻駄引儞也斛娜捨阿引頗迦宿諾乞叉二合怛羅二合縷且怛囉梨吒吒降反十捺捨法達麼當但得迦攞櫃多嚩曩怨怛羅二合沙多且多引嚩都貪怛里二合瑟拏二合引猜但迦泊喉哆引嚕向多𠰘已上義淨千字文已上以唐梵文字梵字合點齒娜多去重酌捺喇地未定之見捺喇捨曩又縛捨也持駄又駄羅燒諾賀南捺乞史二合拏二娜尾底汝怛嚩又悉怛嚩又怛縛也彼許怛娑計二合囉秤捺都攞十二娜嚩二合捺舍與娜儞耶十三那囉庾捺捨布他者拏二十娜縛二合尾舍銅多摩囉二十三但囉二合庾引尾舍十二百捺縛二合那捨捨多一千二百也三萬娜嚩尾捨底娜娑訶薩囉末怛怒尼古反羅女子娜引哩迦閹人捺本娑迦小兒娜引囉迦奴娜引娑婢娜引集今日多嚩儞也梨吒那娑門娜嚩二合哩宿諾察怛囉二合霞怛引敏嚕拏弓駄怒沙野怒嚩又阿吒尾鎌娜怛嚂虻娜娜娑石榴娜捺儞屈反麼青桐怛哩二合跛哩胒二合𮑱捺囉二合乞叉菊捺囉二合縛拏秦膠怛囉耶麼拏憧駄嚩二合惹門娜縛引囉門扉娜縛二合囉鉢怛羅經堂達磨矩里市吒力賀炙怛吠無背反甥哆誐泥也右拏乞史二合拏亦南也已上出禮言梵語雜名星童男童女椀打鼻齒衣三富餅暗咬穀軟木散壞施與應經財主者財也財穀米碧頗梨已上全眞千字文星物貧宿星旦喉梨黄苽宮油已上出全眞唐梵文字多陀阿伽陀亦云多薩阿竭此云如來安穩道來不去也大論第三提舍如來此云説亦云光提惒竭羅此云大殿是佛號多摩羅跋栴檀香佛此云藿葉香陀羅尼遊戲佛此云持荼毘羅耶佛經曰月光明王多加羅佛此香名也提羅耶佛可云提梨耶此云妄祥提惒迦羅佛可云提婆迦羅此云天時已上佛名號馳摩亦云達摩此云法陀魔陀呪此云伏鬼檀越此云施主陀摩此云調伏陀羅書此云持已上經法名茶闍他可云那訶論云不阿羅釋迦此云能持陀羅歟多他論云如拏可云那論云那不也咜婆可云悉歌婆論云障礙他那可云悉他奈論云處多羅可云他羅論云岸也達嚫應云達親拏亦云達親那此云布施憎一阿舍第一陀那羅此云物他跋偸可云悉他那跋偸此云住處提婆摩菟此云天人陀無陀此云歡喜鳥陀樓檀那此云陀樓者木檀那者施陀那婆羅此云陀那者思惟婆羅者力多羅木此云重也佇龍反陀離此云谷間已上十五雜法墮夜摩提此云智惠陀羅尼菩薩此云總持檀那師利此云施吉已上三菩薩名帶哆浮彌此云過地檀陀浮彌此云猗地已上二菩薩地位名陀羅尼亦云陀隣尼此云持也檀那波底檀那者施波底者越檀波羅蜜可云檀那婆羅蜜檀那此云施波羅此云彼岸蜜此云到是菩薩行名提婆達亦云提婆達多亦多云調達提婆此云天達多此云與達貳迦比丘此云有物陀婆羅此云蘊藻提舍論師此云言説陀摩此云寂靜陀素此云若也陀娑此云苦亦云十達尼吒此云星名達磨此云法也陀薩此云應與陀驃力士子此云陀驃者茅草也達摩提耶達麼此云法提耶此云與提舍尼此云悔過提舍波那尼此云悔過今至提舍勒叉多尼此云悔過護陀驃力士子具應云陀臈毘夜備邏婆分弗多羅陀臈毘夜爲物備邏爲力婆分爲士弗多羅爲子陀驃摩羅子此云物性陀驃迦盧此云物黒提那伽提此云方那伽此云像陀達多此云與陀娑婆羅此云十力陀沙比丘此云苦沓婆摩羅沓婆此云茅摩羅此云花陀醯羅婆娑那此云小年後堂陀娑迦葉比丘此云十姓陀婆法師此云手澤陀樹比丘此云茅陀羅難提此云持歡喜檀若世質此云淨地檀彌離比丘此云樂法已上二十八箇比丘名也檀多此云調伏是比丘尼提婆修可云提婆婆藪此云天寶是比丘尼提舍瞿曇彌比丘尼此云説姓提舍難陀比丘尼此云説喜多吔陀辟此云盡諦是四諦之内滅諦也提舍迦羅尼羅提舍者發露也迦羅尼者應作多羅葉可云波多葉此云重也是王名陀舍羅訶可云陀舍羅陀是王名陀舍此云十羅陀此云魚陀羅達多陀羅此云重達多此云與是王名也多羅蠰佉王陀羅此云重蠰佉此云阿提陀羅尼王可云施多陀羅尼施多此云自陀羅尼云持提婆令奴太子此云天寶他磨尸利王子他磨此云花鬘尸利此云吉提鞞羅提鞞此云天羅此云除是人名也提波延那仙人提波者州也延那者生也逮波耶那逮波者州也耶那者生也多波須此云若道是外道名檀提梵志此云罸達麼提那此云法與也雜人部多波揵尼劍此云山火是道外名提舍菟可云後梨舍那此云見是居士名提鼻伽羅提提毘者夫人也提婆跋提提婆者天跋提者賢已上二夫人也檀膩伽女可云陀膩伽此云物陀膩䩭女此云有物檀般那園應云檀那般那此云施林多摩沙林此云陰多羅樹此云重施盧此云破亦云耕是草名也多羅梨花此云重多摩羅香此云藿香檀菟迦利花可云檀菟師迦利檀菟弓迦梨者作檀倶摩梨可云檀那倶摩梨此云施童子是木名多勒可云多羅樹名也怛刹那經曰二十刹那是時分也多伽樓論云木香樹此云不設多摩羅跋香此云藿葉已上十三雜人部多伽羅香此云根提婆達兜應云提婆達多譯云天與陀梨舍菟應云陀梨舍那譯曰見躭浮樓譯云天樂岳達多摩那譯云達多者與摩那者意也陀塞䩭應云陀那塞䩭譯云陀那者施塞䩭者能提婆鳩吒山此云天臺檀持山可云檀施樂此云蔭也山部多跎迦可云鉢葋吒迦此云至多浮河可云多簸此云執彌婆闍梨迦林可云絶婆闍梨譯闍梨令煮施婆午檀持羅和林可云檀荼婆羅檀荼者罸婆羅勝多羅樹亦云多羅此云重也陀菟伽梨花樹此云弓作陀婆闍藥律云烟藥陀那跋吒此云物長陀若跋吒此云榖長陀婆譯云駄行多虚提此云樹起達多跋陀羅此云與賢陀婆摩羅譯云陀婆者山摩羅者行次亦云花鬘檀尼寶容應云達尼迦檀尼者此云物怛惒尼應云耽婆尼此云不動雜人部提婆娑那可云提婆婆娑那此云天愛已上雜人部陀那婆陀那者施婆者有也提頭頼吒應云提栗哆頼吒提栗多者治頼吒者國也闥婆摩羅應云達波摩羅達波者勇摩羅者花也神部也檀陀羅此云癡已上三鬼神名憚眸迦應云單菟歌此云薄鬼神部陀毘羅龍王此云大提梨吒龍王可云提梨師吒此云住山大檀那波羅像檀那者物波羅者守亦護提迷魚亦低米此云闇也怛車地應云怛叉此云視毒提迷耆羅魚應云低米耆門此云闇天也𮜌迦羅毘師子經云賢誓提舍泥梨提舍者説泥梨者此云無可樂是地獄也多伽樓世界可云多伽羅此云根香多刹施羅國亦云但叉尸羅亦云得叉尸羅多刹此云鑒施羅此云不多耆尸此云曲也達嚫那波多國達嚫那者布波陀者脚也提和竭國可云提波那伽羅此云天城已上五國也提毘羅傳曰孔空城提羅傳云圻上城達摩那伽羅此云法城多摩那竭傳曰洋銅城那竭可云那伽羅此云城多羅致城可云哆摩粟致此云樂著多羅聚落此樹名也陀毘陀此云不智提婆不多傳曰天子精舍也提波毘訶傳曰天子寺毘訶羅者此云寺陀林寺可云陀林摩傳曰石留已上出翻梵語集多摩沙林此云蔭也多伽耆梨多伽者曲也耆梨頭林部陀陀毘陀譯云事火陀羅書譯云持已上外道法陀摩論云普也譯曰調伏荼闍他應云那陀訶論云不契咜婆應云悉耽婆論曰障礙多羅應云他羅論曰岸也闥剌吒應云闍梨栗吒譯曰見也十誦第三他跋偸應云悉他那跋偸譯云住處達磨提那譯云法與陀梨舍菟應云陀梨舍那譯曰見也提婆跋提夫人譯曰天賢賢愚經九提婆跋提譯曰天喜十善十惡經𮜌迦羅晉言賢誓賢愚經十多他盡多掲羅零陵香出零陵懸中捺刺施葦香已上香藥部荼掲妬人名也塔頭佛刹名已上荼袾蘇代那此云闇林提婆羼那此云天軍聖名多摩羅跋旃檀香此云性無垢賢達須謂此等人微識佛法多那花此云相續花達摩摩提此云法意達摩波若此云曇法智達摩笈多此云法密多羅承伽隋云未脛陀毘荼國書隋云南天竺陀羅多書鳥場邊山陀羅尼卑叉梨書觀地達摩耶舍隋云法稱陀奢婆梨伽隋云十相檀孃耶那隋云去至檀那達多隋云勝財與達舍婆陵伽隋云十相提婆鼻何羅隋云遊天謂國王遊已上出信行梵語集怛他掲多怛他是如義掲多是受義知解義説義去義古譯云如來部戒本出大日疏一娜衍名行亦云道大日疏一多伽樓大論十云大香樹也禮書𮀉佉入又𮀉佉人已上義淨千字文跢多此云金是比丘部出翻梵語塗禮跛取隷娜又囉力紇曩書疏𮀉佉已上三出禮言雜名所天娑縛誐日素引哩也二合流素路二合多少窣妬二合迦想僧若拏二合引綏蘇悉體他以反二合翠素上囉誐行僧娑迦二合引羅存僧上計多上略僧乞差二合跛基素播難綖素怛覽二合連僧室𮀉二合曬酢束多刀措哩阿引庾駄晨素哩喩二合娜也針素止引吉贈誐哩也二合形僧娑多二合南經素怛囉二合繍素止羯磨堅蘇韈拏重酒蘇上羅禪措置迦主娑縛二合引弭對勘全眞唐梵文字合點梵字了已上義淨千字文置娑嚩二合引比多人劣娑嚩二合攞跛社娑嚩二合𠳤弭踞娑嚩二合沙底迦娑曩清娑嚩二合縒僧僧伽音娑縛二合囉春娑曩二合賀上肩娑建二合駄已上義淨千字文金安穩兒胡歡樂已上唐梵文字勝須彌此云好光是佛號部蘇陀蘇摩王經僧祇陀經此云衆集僧耆品可云者多此云衆説僧述多經此云相應僧育多阿含此云相應歸已上五經法部僧佉此云微也蘇陀夷此云共出塞陀此云陰亦云聚勝尼波多此云墮落塞陀波梨婆羅可云私建陀波利波此云陰翼從僧伽此云衆也僧舍摩可云僧舍摩譯曰至寂僧呿此云珂也僧那可云僧那訶此云鎧孫陶鉢孫陶此云可愛大可愛僧祇物此云大衆已上十一雜法部僧迦羅刹此云衆護是菩薩部僧亦云僧伽論云和合衆也蘇摩此云月蘇坻此云聞也僧迦摩此云橋梁僧伽遮此云偏袒蘇陀此云白也蘇陀夷此云共出蘇那𤘽此云寂靜僧伽密多此云衆親友僧伽耶舍此云衆名聞僧伽修婆此云衆實僧伽稀婆此衆天僧伽跋撜此云衆賢僧伽多羅可云僧伽羅多此云衆度僧伽羅刹比丘此云衆護塞陀達多比丘此云行與孫陀槃梨孫陀羅者好婆利者勝孫陀槃梨此云好根蘇那刹多此云星姓已上十九比丘部素摩亦云修摩此云月蘇羅比丘尼此云勇升迦羅比丘尼可云升歌羅此云好時也蘇毘提可云蘇毘陀此云毘者智蘇毘提夷此云國名也僧伽難提比丘尼此云衆喜已上六尼部僧跋此云等至已上聲聞徳行僧伽婆尸沙此云衆殘亦云僧餘僧伽婆尸沙舊譯云衆殘亦云衆餘持律者云僧殘亦云僧救聲論者云僧伽翻爲衆婆尸沙翻爲餘案此翻譯云僧殘是合胡梁語云云已上一罪障部孫陀羅難陀比丘舊譯云孫陀羅者可愛亦云好難陀者歡喜聲論者云孫陀羅翻爲好難陀翻爲喜僧迦羅婆羅門此云計數是波罪門勝伽王此云具也亦云師子僧伽達此云衆與已上二王太子部蘇尼哆弟子此云面孫陀羅槃梨此云妙勝僧訖惡始此云不安已上三外道部僧伽羅摩長者此云衆國藪婆頭樓此云好賢六遇出家經應云藪跋陀羅信行云極見藪達梨舍菟此云極好見也已上二居士部孫陀利女此云好容貎大論九升離女可云首陀此云白蘇曼女此云可愛孫陀利譯云可愛已上三女人部孫陀羅諦利孫陀羅者好諦利者女藪婆頭譯曰善言論也藪達梨舍菟譯曰好見僧勒語多應云僧伽路起多譯曰衆護素迦人應云釋迦譯云能已上五雜人部僧奢摩應云騰奢摩此云蛇曰是虫部僧迦羅叉此云等耀蘇羅波國此云好悟蘇毘地呵可云蘇毘啼呵此云極好身也已上三國土部僧迦舍城此云光蘇𩋾闍傳曰忍辱人城僧加沙城此云光明已上三城部蘇維屠樹可云蘇薩祥尼此云好亭蘇摩那律曰其騰生蘇羅婆此云好得已上二草部蘇至遮迦華此云淨論蘇樓至栴那華此云好樂已上二花部僧祇支舊譯曰偏袒持律者曰助身衣聲論者云正外國音應言僧客役僧割翻爲肩侈翻爲覆總説無非助身衣別應以震肩衣爲正僧岐支亦云僧祇支此云偏袒僧那僧濕此云莊飾鎧已上三衣服僧迦摩寺此云橋梁蘇彌國可云蘇彌耶僧伽尸國亦云僧伽舍此云等耀僧伽施可云僧迦施羅此云白玉是寶部僧伽地拔此云合會已上出翻梵語集蘇毘鹽可云蘇比羅此云好勇飮食部蘇迦蘭那譯曰加蘇摩夫人譯曰月塞畢力迦首蓿香蘇佉迷羅細豆𦽛三角白色芿山名也芿而證反僧伽跋陀羅此云衆賢僧名也蘇磨補羅此云花宮蘇跋陀此云善賢長者後改爲手長者孫達羅此云艷也窣堵曾迦香古云樓婆香又云求求羅香窣堵此云極僧愼爾耶此云正了知古云散脂訛略也眞諦云散脂者此云塵補蘇跋拏雞舍此云金髮鬼也蘇跋拏者金雞舍者髮蘇摩那花此云如意花蘇多末尼即施與如意蘇伐刺拏瞿呾羅國此云金氏國僧伽跋登此云衆現蘇達拏太子此云善牙僧佉書隋言等計六十四書之内蘇摩那隋云善意蘇畢利耶隋云善愛蘇弗室利隋云善女僧薩他那隋云正安已上雜事已上出信行梵語集筯薩嚩庾好色素嚩囉拏嗅蘇上娜舍二合氣誐駄嗅氣之類也香素誐駄流窣嚕哆飢素覩乞史娜又訖數駄樂素佉快素悌經蘇怛羅現素儞剌麼欖極素率覩樂蘇吉陀羅各薩嚩迦繍素指迦刺麼針蘇指金素引嚩㗚拏二合胡蘇哩頗梨薩頗置迦曬素沙拏酒蘇囉又昧娜也日蘇哩也二合又婆薩迦夢薩嚩拏多寶蘇迦攞金翅鳥薩嚕拏蚯蚓素嚕弭蘇折迦葵素韈者羅浮圖素覩波大戟素韈拏乞地二合羅縮砂蜜素乞史二合謎羅已上出禮言梵語雜名金呪索野狐置也處所猪少兒笙胡音主樂自力兵馬契經水精曰水精出火者已上全眞梵唐語莎訶此云善説也莎蘇和反出一切經音義第二十四也私曰此詞可入左部依普通談加此篇也津頭婆伽婆呵云佛頭婆伽婆此云覺功徳頭摩亦云豆摩此云烟也頭吃想姤此云苦邊盡也已上三雜法部頭陀可云阿蘭那此云殺賊亦云應供頭陀持律者云抖藪聲論者云正外國音應云偸多翻爲除塵抖藪是辟翻除塵是正翻頭多殺此云不好頭婆私多此云微細罪頭和遮此云煇擾已上四罪障部豆摩種姓婆羅門此云豆摩者煙豆婆遮種姓婆羅門此云惡治已上二婆羅門頭留摩先王此樹名也是王部頭摩此云直木頭陀梵志此云葉擲頭多胡梵志可云頭多求那此云棄功徳已上四外道頭迦羅城可云頭和迦羅此云苦行是城部頭求羅衣可云頭鳩羅亦云頭久羅此云細布是衣服部頭磨應云頭樓磨譯云樹亦住是雜人部豆佉晋云苦亦云逗迦已上雜法部已上出翻梵語集頭吃想姤應云獨呵那姤譯云苦邊書已上出信行梵語集頭頼吒犍闥婆王應云峙履多頼吒此云治國禰念密奢山此云眴出翻梵語集涅樓遮諦此云如是説也雜法部出之涅槃涅羅師利此云大吉那名曩引麼縱曩儞也曩哆引嚩九曩嚩乳曩引娜新曩嚩龍曩引誐河曩儞儞以反引城曩誐囕無曩引悉底二合鼻曩娑甲曩佉上臍曩毘已上義淨千字文涅洹僧舊譯云方衣